<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Какое ты приложение 📱</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.06);--surface3:rgba(255,255,255,0.10);
  --text:#8890a8;--text-dim:#585e70;--text-bright:#e0e4f0;
  --border:rgba(255,255,255,0.06);
  --blue:#3478f6;--green:#30d158;--red:#ff453a;--orange:#ff9f0a;--purple:#bf5af2;--pink:#ff375f;--teal:#64d2ff;--indigo:#5e5ce6;
  --glow:rgba(52,120,246,0.12);
  --card-shadow:0 2px 20px rgba(0,0,0,0.3);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
.container{max-width:640px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}

.header{text-align:center;padding:40px 0 24px;animation:fadeUp .8s ease}
.header-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);font-weight:600;margin-bottom:20px}

/* Phone mockup header */
.phone-mock{width:200px;height:380px;margin:0 auto 20px;background:var(--bg2);border-radius:30px;border:2px solid rgba(255,255,255,0.08);padding:12px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:fadeUp .8s ease .1s both}
.phone-notch{width:80px;height:6px;background:rgba(255,255,255,0.1);border-radius:6px;margin:4px auto 12px}
.phone-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:6px}
.phone-icon{width:100%;aspect-ratio:1;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative}
.phone-icon .pi-badge{position:absolute;top:-3px;right:-3px;width:14px;height:14px;background:var(--red);border-radius:50%;font-size:7px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}

h1{font-size:clamp(2rem,7vw,3rem);font-weight:900;color:var(--text-bright);line-height:1.1;margin-bottom:14px;letter-spacing:-.5px}
h1 span{color:var(--blue)}
.lead{font-size:15px;color:var(--text-dim);max-width:440px;margin:0 auto;line-height:1.7;font-weight:400}

.btn-start{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px;border:none;border-radius:14px;background:var(--blue);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s ease;animation:fadeUp .8s ease .3s both;box-shadow:0 6px 30px var(--glow);margin-top:28px}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(52,120,246,0.25)}

.progress-container{position:sticky;top:0;z-index:99;background:rgba(10,10,15,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0 10px;margin-bottom:20px;border-bottom:1px solid var(--border);display:none}
.progress-container.active{display:block}
.progress-top{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-label{font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.progress-count{font-size:12px;color:var(--blue);font-weight:700}
.progress-bar{height:3px;background:var(--surface2);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));border-radius:10px;transition:width .5s ease;width:0}

.q-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:30px 24px;box-shadow:var(--card-shadow);animation:fadeUp .45s ease}
.q-num{font-size:11px;letter-spacing:2px;color:var(--blue);font-weight:700;margin-bottom:14px}
.q-text{font-size:20px;font-weight:700;color:var(--text-bright);line-height:1.35;margin-bottom:8px;letter-spacing:-.3px}
.q-sub{font-size:14px;font-style:italic;color:var(--text-dim);margin-bottom:22px;line-height:1.6}

/* Notification-style hint */
.notif-hint{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:12px;margin-bottom:18px}
.notif-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.notif-text{font-size:12px;color:var(--text-dim);line-height:1.4}
.notif-time{font-size:10px;color:var(--text-dim);margin-left:auto;flex-shrink:0;opacity:.6}

.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:var(--surface2);border:2px solid transparent;border-radius:14px;cursor:pointer;transition:all .25s ease;font-size:14px;color:var(--text);line-height:1.5;user-select:none}
.option:hover{border-color:rgba(52,120,246,0.15);background:var(--surface3)}
.option.selected{border-color:var(--blue);background:rgba(52,120,246,0.06)}
.opt-emoji{font-size:20px;flex-shrink:0}

.btn-next{width:100%;padding:14px;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s ease;margin-top:14px;background:var(--surface2);color:var(--text-dim);opacity:0;pointer-events:none}
.btn-next.active{opacity:1;pointer-events:all;background:var(--blue);color:#fff;box-shadow:0 4px 16px var(--glow)}

/* ═══ RESULTS ═══ */
.results-section{display:none}
.results-section.active{display:block;animation:fadeUp .8s ease}

/* App result card */
.app-card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:36px 24px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.app-icon-big{width:96px;height:96px;border-radius:22px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 8px 30px rgba(0,0,0,0.4)}
.app-label{font-size:10px;text-transform:uppercase;letter-spacing:3px;font-weight:700;margin-bottom:8px}
.app-name{font-size:clamp(1.8rem,6vw,2.6rem);font-weight:900;color:var(--text-bright);margin-bottom:4px}
.app-aka{font-size:13px;font-style:italic;margin-bottom:16px}
.app-tagline{font-size:15px;color:var(--text);max-width:440px;margin:0 auto;line-height:1.65}

/* Notification result */
.notif-result{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;animation:fadeUp .4s ease both}
.nr-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.nr-body{flex:1;min-width:0}
.nr-title{font-size:13px;font-weight:600;color:var(--text-bright)}
.nr-text{font-size:12px;color:var(--text-dim);line-height:1.5;margin-top:2px}
.nr-time{font-size:10px;color:var(--text-dim);opacity:.5;margin-top:4px}

.r-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px 22px;margin-bottom:14px}
.r-card h3{font-size:14px;font-weight:700;color:var(--text-bright);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.r-card p{font-size:14px;color:var(--text-dim);line-height:1.8}

.perm-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.perm{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:10px;font-size:12px;color:var(--text)}
.perm-icon{font-size:16px;flex-shrink:0}
.perm-toggle{width:34px;height:20px;border-radius:10px;margin-left:auto;position:relative;flex-shrink:0}
.perm-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:16px}

.sc-bars{margin:14px 0 4px}
.sc-row{margin-bottom:12px}
.sc-row-top{display:flex;justify-content:space-between;margin-bottom:4px}
.sc-name{font-size:12px;color:var(--text);font-weight:500;display:flex;align-items:center;gap:6px}
.sc-val{font-size:11px;font-weight:700}
.sc-bg{height:5px;background:var(--surface2);border-radius:10px;overflow:hidden}
.sc-fill{height:100%;border-radius:10px;transition:width 1.2s ease;width:0}

.gallery-toggle{width:100%;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;color:var(--text-dim);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s ease;margin-bottom:14px}
.gallery-toggle:hover{border-color:var(--blue);color:var(--blue)}
.gallery{display:none;flex-direction:column;gap:6px;margin-bottom:14px}
.gallery.open{display:flex;animation:fadeUp .4s ease}
.gallery-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.gallery-item.current{border-color:var(--blue);background:rgba(52,120,246,0.04)}
.gi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.gi-body{flex:1;min-width:0}
.gi-name{font-size:12px;font-weight:600;color:var(--text-bright)}
.gi-desc{font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gi-badge{font-size:8px;padding:2px 7px;background:rgba(52,120,246,0.1);color:var(--blue);border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:1px;flex-shrink:0}

.actions{display:flex;flex-direction:column;gap:10px;padding-top:28px;border-top:1px solid var(--border)}
.btn-act{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border-radius:14px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s ease;text-decoration:none}
.btn-primary{background:var(--blue);color:#fff;border:none;box-shadow:0 4px 16px var(--glow)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue)}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);font-weight:500}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--blue);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform .4s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.container{padding:12px 14px 50px}.q-card,.r-card{padding:24px 16px}.q-text{font-size:18px}.option{padding:12px 14px;font-size:13px}.phone-mock{width:170px;height:320px}}
</style>
</head>
<body>
<div class="container">
  <div id="headerSection">
    <div class="header">
      <div class="header-badge">📱 тест-приложение</div>
      <div class="phone-mock">
        <div class="phone-notch"></div>
        <div class="phone-grid">
          <div class="phone-icon" style="background:var(--green)">💬<span class="pi-badge">3</span></div>
          <div class="phone-icon" style="background:var(--blue)">📷</div>
          <div class="phone-icon" style="background:var(--orange)">🎵</div>
          <div class="phone-icon" style="background:var(--red)">📍</div>
          <div class="phone-icon" style="background:var(--purple)">🧠</div>
          <div class="phone-icon" style="background:var(--pink)">❤️</div>
          <div class="phone-icon" style="background:var(--teal)">📊</div>
          <div class="phone-icon" style="background:var(--indigo)">⚙️<span class="pi-badge">!</span></div>
          <div class="phone-icon" style="background:#ff6b35">📅</div>
          <div class="phone-icon" style="background:#5856d6">🔒</div>
          <div class="phone-icon" style="background:#34c759">💰</div>
          <div class="phone-icon" style="background:#af52de">🎮</div>
        </div>
      </div>
      <h1>Какое ты <span>приложение</span></h1>
      <p class="lead">У тебя на телефоне 80+ приложений. Но одно из них — это ты. Не какое ты используешь — а какое ты есть.</p>
    </div>
    <button class="btn-start" onclick="startTest()">Разблокировать 📱</button>
  </div>
  <div class="progress-container" id="progressBar">
    <div class="progress-top">
      <span class="progress-label">Сканирование</span>
      <span class="progress-count" id="progressCount">01 / 16</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="qContainer"></div>
  <div class="results-section" id="resultsSection"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const A={
  calc:{icon:"🧮",name:"Калькулятор",aka:"«всё посчитано»",color:"#636366",bg:"linear-gradient(135deg,#3a3a3c,#636366)",

    desc:"Заметки — свалка гениальности. Тут и список покупок, и идея стартапа, и черновик признания в любви, и рецепт борща. Ты так же: в тебе много всего, и не всё структурировано. Но когда нужно — ты достаёшь именно то, что нужно. Иногда.",
    notifs:[{title:"Идеи",text:"У тебя их 200. Реализованных — 3. Но какие!"},{title:"Память",text:"Ты записываешь всё. Потому что забудешь через 5 минут"},{title:"Глубина",text:"Между списком покупок и философией жизни — одна строка"}],

    notifs:[{title:"Навигация",text:"Ты ориентируешься в хаосе лучше большинства"},{title:"Уверенность",text:"Даже если не знаешь куда — выглядишь так, будто знаешь"},{title:"Пунктуальность",text:"Ты знаешь сколько минут до любой точки"}],

    perms:["🎧 Постоянный саундтрек","💫 Создание атмосферы","😢 Глубокие эмоции","🎶 Музыка на каждый случай"],

  settings:{icon:"⚙️",name:"Настройки",aka:"«дай я сам(-а) настрою»",color:"#8e8e93",bg:"linear-gradient(135deg,#636366,#8e8e93)",

  tinder:{icon:"🔥",name:"Тиндер",aka:"«свайпаю жизнь»",color:"#ff375f",bg:"linear-gradient(135deg,#ff375f,#ff6b6b)",

let curQ=0,selOpt=null;

function startTest(){
  document.getElementById('headerSection').style.display='none';
  document.getElementById('progressBar').classList.add('active');
  showQ(0);
}

function showQ(i){
  const q=questions[i],num=String(i+1).padStart(2,'0');
  selOpt=null;
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">${num} / ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      ${q.sub?`<div class="q-sub">${q.sub}</div>`:''}
      <div class="options">${q.opts.map((o,j)=>`<div class="option" onclick="sel(this,${j})"><span class="opt-emoji">${o.e}</span><span>${o.text}</span></div>`).join('')}</div>
      <button class="btn-next" id="btnNext" onclick="nxt()">${i===questions.length-1?'Установить приложение 📱':'Дальше →'}</button>
    </div>`;
  document.getElementById('progressCount').textContent=`${num} / ${questions.length}`;
  document.getElementById('progressFill').style.width=`${(i/questions.length)*100}%`;
  window.scrollTo({top:document.getElementById('progressBar').offsetTop-10,behavior:'smooth'});
}

function sel(el,i){
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  selOpt=i;
  document.getElementById('btnNext').classList.add('active');
}

function nxt(){
  if(selOpt===null)return;
  const sc=questions[curQ].opts[selOpt].sc;
  for(const[k,v]of Object.entries(sc))scores[k]+=v;
  selOpt=null;curQ++;
  curQ<questions.length?showQ(curQ):showResults();
}

  const topK=sorted[0][0],a=A[topK],maxVal=Math.max(sorted[0][1],1);

  const top8=sorted.slice(0,8);
  const barsHTML=top8.map(([k,v])=>{const pct=Math.round((v/maxVal)*100);return`<div class="sc-row"><div class="sc-row-top"><span class="sc-name"><span style="display:inline-flex;width:20px;height:20px;border-radius:5px;align-items:center;justify-content:center;font-size:11px;background:${A[k].bg}">${A[k].icon}</span> ${A[k].name}</span><span class="sc-val" style="color:${A[k].color}">${pct}%</span></div><div class="sc-bg"><div class="sc-fill" data-w="${pct}" style="background:${A[k].bg}"></div></div></div>`;}).join('');

  const notifsHTML=a.notifs.map((n,i)=>`<div class="notif-result" style="animation-delay:${i*.15}s"><div class="nr-icon" style="background:${a.bg}">${a.icon}</div><div class="nr-body"><div class="nr-title">${n.title}</div><div class="nr-text">${n.text}</div></div></div>`).join('');

  const permsHTML=a.perms.map(p=>`<div class="perm"><span class="perm-icon">${p.split(' ')[0]}</span><span>${p.split(' ').slice(1).join(' ')}</span><div class="perm-toggle" style="background:${a.color}"></div></div>`).join('');

  const galleryHTML=K.map(k=>{const aa=A[k],cur=k===topK;return`<div class="gallery-item ${cur?'current':''}"><div class="gi-icon" style="background:${aa.bg}">${aa.icon}</div><div class="gi-body"><div class="gi-name">${aa.name}</div><div class="gi-desc">${aa.aka}</div></div>${cur?'<span class="gi-badge">Ты</span>':''}</div>`;}).join('');

  const section=document.getElementById('resultsSection');
  section.classList.add('active');
  section.innerHTML=`
    <div class="app-card">
      <div class="app-icon-big" style="background:${a.bg}">${a.icon}</div>
      <div class="app-label" style="color:${a.color}">Ты — приложение</div>
      <div class="app-name">${a.name}</div>
      <div class="app-aka" style="color:${a.color}">${a.aka}</div>
      <div class="app-tagline">${a.tag}</div>
    </div>

    ${notifsHTML}

    <div class="r-card"><h3>📱 Описание</h3><p>${a.desc}</p></div>

    <div class="r-card"><h3>🔐 Разрешения</h3><div class="perm-list">${permsHTML}</div></div>

    <div class="r-card"><h3>📊 Экран приложений (топ-8)</h3><div class="sc-bars">${barsHTML}</div></div>

    <div class="r-card"><h3>🐛 Баг</h3><p>${a.shadow}</p></div>

    ${sorted[1][1]>3?`<div class="r-card"><h3>🔀 Второе приложение: ${A[sorted[1][0]].icon} ${A[sorted[1][0]].name}</h3><p>${A[sorted[1][0]].tag}</p></div>`:''}

    <button class="gallery-toggle" onclick="document.getElementById('gal').classList.toggle('open')">📱 Все 14 приложений</button>
    <div class="gallery" id="gal">${galleryHTML}</div>

    <div class="actions">
      <button class="btn-act btn-primary" onclick="shareShort()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg> Поделиться</button>
      <button class="btn-act btn-secondary" onclick="copyFull()">📋 Скопировать</button>
      <a href="https://lisofoxa-oss.github.io/tests/" class="btn-act btn-secondary">🧪 Ещё тесты</a>
      <button class="btn-act btn-ghost" onclick="location.reload()">↻ Переустановить</button>
    </div>`;
  setTimeout(()=>document.querySelectorAll('.sc-fill').forEach(b=>b.style.width=b.dataset.w+'%'),400);
  window.scrollTo({top:0,behavior:'smooth'});
}

function shareShort(){
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const a=A[sorted[0][0]];
  const text=`${a.icon} Я — ${a.name} ${a.aka}\n\n${a.tag}\n\n📱 А ты? https://lisofoxa-oss.github.io/tests/`;
  if(navigator.share)navigator.share({title:'Какое ты приложение',text}).catch(()=>{});
  else navigator.clipboard.writeText(text).then(()=>showToast('Скопировано!'));
}

function copyFull(){
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const a=A[sorted[0][0]],maxVal=Math.max(sorted[0][1],1);
  const bars=sorted.slice(0,8).map(([k,v])=>{const p=Math.round((v/maxVal)*100);return`  ${A[k].icon} ${A[k].name}: ${'█'.repeat(Math.round(p/10))}${'░'.repeat(10-Math.round(p/10))} ${p}%`;}).join('\n');
  const text=`📱 КАКОЕ ТЫ ПРИЛОЖЕНИЕ\n\n${a.icon} ${a.name}\n${a.aka}\n\n«${a.tag}»\n\n📊 Экран:\n${bars}\n\n${a.desc}\n\n🐛 Баг: ${a.shadow}\n\n→ https://lisofoxa-oss.github.io/tests/`;
  navigator.clipboard.writeText(text).then(()=>showToast('📋 Скопировано!'));
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Психологические тесты ✨</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">

    <!-- Theme picker -->
    <div class="theme-picker-wrap">
      <div class="theme-picker">
        <span class="theme-picker-label">Тема:</span>
        <button class="theme-btn active" data-theme="dark" title="Тёмная" onclick="setTheme('dark')"></button>
        <button class="theme-btn" data-theme="light" title="Светлая" onclick="setTheme('light')"></button>
        <button class="theme-btn" data-theme="latte" title="Латте" onclick="setTheme('latte')"></button>
        <button class="theme-btn" data-theme="coral" title="Коралл" onclick="setTheme('coral')"></button>
        <button class="theme-btn" data-theme="rosegold" title="Розовое золото" onclick="setTheme('rosegold')"></button>
        <button class="theme-btn" data-theme="lavender" title="Лаванда" onclick="setTheme('lavender')"></button>
        <button class="theme-btn" data-theme="sage" title="Шалфей" onclick="setTheme('sage')"></button>
        <button class="theme-btn" data-theme="pink" title="Розовая" onclick="setTheme('pink')"></button>
        <button class="theme-btn" data-theme="ocean" title="Океан" onclick="setTheme('ocean')"></button>
        <button class="theme-btn" data-theme="sunset" title="Закат" onclick="setTheme('sunset')"></button>
        <button class="theme-btn" data-theme="neon" title="Неон" onclick="setTheme('neon')"></button>
        <button class="theme-btn" data-theme="gray" title="Серая" onclick="setTheme('gray')"></button>
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="header-badge">Коллекция тестов</div>
      <h1>Узнай себя <span>по-настоящему</span></h1>
      <p class="header-desc">Психологические тесты с научной базой, красивыми результатами и щепоткой юмора</p>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Найти тест...">
      </div>
    </div>

    <div class="count-bar">
      <span class="count-text">Всего тестов: <span class="count-num" id="countNum">0</span></span>
    </div>

    <!-- Cards grid -->
    <div class="grid" id="quizGrid"></div>

    <!-- Footer -->
    <div class="footer">
      <p class="footer-main">Тесты основаны на реальных психологических теориях.<br>Но помни: ни один тест не знает тебя лучше, чем ты 🤍</p>
      <p class="footer-heart">made with love for зайка 🐰</p>
    </div>
  </div>

  <script>
    /* ═══ THEME SYSTEM ═══ */
    function setTheme(name) {
      document.documentElement.setAttribute('data-theme', name);
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.theme-btn[data-theme="${name}"]`).classList.add('active');
      try { localStorage.setItem('theme', name); } catch(e) {}
    }

    try {
      const saved = localStorage.getItem('theme');
      if (saved) setTheme(saved);
    } catch(e) {}

    /* ═══ TESTS DATA ═══ */
    const tests = [
      { cat: "science", folder: "element", emoji: "⚗️🧬", title: "⚗️ Какой ты элемент?", desc: "Периодический тест — 8 элементов, реальная химия, твой характер" },
      { cat: "science", folder: "foto", emoji: "🪞🔬", title: "Почему ты не отправляешь это фото?", desc: "Научный тест на основе 6 психологических шкал" },
      { cat: "science", folder: "age", emoji: "⏳🔬", title: "Почему ты скрываешь возраст?", desc: "Научный тест — 6 психологических механизмов" },
      { cat: "science", folder: "yazik-lubvi", emoji: "🔬💖", title: "Какой у тебя язык любви?", desc: "На основе реальной психологии" },
      { cat: "science", folder: "love", emoji: "❤️", title: "Насколько ты влюблён(а)", desc: "Серьёзный тест для пары" },
      { cat: "fun", folder: "witch", emoji: "🌙✨", title: "Какая ты ведьма?", desc: "Выбери стихию и узнай свой тип магии" },
      { cat: "fun", folder: "animal", emoji: "🐾💕", title: "Какое ты животное в отношениях?", desc: "Стиль привязанности с зоологической точностью" },
      { cat: "fun", folder: "drink", emoji: "🍷🧪", title: "Какой ты напиток?", desc: "Тест на темперамент с нотками науки" },
      { cat: "fun", folder: "movie", emoji: "🎬⚔️", title: "Какой ты персонаж в фильме?", desc: "Тест на архетип по Юнгу и Кэмпбеллу" },
      { cat: "fun", folder: "shy", emoji: "🙈✨", title: "Чего ты стесняешься?", desc: "Шуточный тест с капелькой психологии" },
      { cat: "fun", folder: "girl-vibe", emoji: "🎀🌸", title: "Какой ты тип девушки по вайбу", desc: "13 вопросов — узнай свою эстетику" },
      { cat: "fun", folder: "otbitaya", emoji: "🤪🔥", title: "🤪 Насколько ты отбитая?", desc: "16 вопросов — наука, юмор и честный диагноз" },
      { cat: "vibe", folder: "besit", emoji: "🔥😤", title: "Как тебя выбесить?", desc: "8 вопросов — наука + юмор" },
      { cat: "vibe", folder: "vibe", emoji: "😈🌙", title: "В какое время суток твой вайб", desc: "Жаворонок, сова или ночной демон?" },
      { cat: "vibe", folder: "gulyanka", emoji: "🌳☀️", title: "Когда сегодня идти гулять", desc: "Научный тест — идеальное время для прогулки" },
      { cat: "vibe", folder: "redflag", emoji: "🚩💀", title: "🚩 Какой ты Red Flag?", desc: "12 ситуаций — и твоя токсичная суперсила как на ладони" }
    ];

    const catLabels = {
      science: '🔬 Научные',
      fun: '✨ Развлекательные',
      vibe: '🌀 Вайб-тесты'
    };

    /* ═══ RENDER ═══ */
    const grid = document.getElementById('quizGrid');
    const searchInput = document.getElementById('searchInput');
    const countNum = document.getElementById('countNum');

    function renderCards(list) {
      grid.innerHTML = '';
      if (list.length === 0) {
        grid.innerHTML = '<div class="empty"><span class="empty-emoji">🔍</span><div class="empty-text">Ничего не найдено</div></div>';
        countNum.textContent = '0';
        return;
      }

      const isSearch = searchInput.value.trim().length > 0;
      let delay = 0;

      if (isSearch) {
        list.forEach(test => {
          grid.appendChild(makeCard(test, delay));
          delay++;
        });
      } else {
        ['science', 'fun', 'vibe'].forEach(cat => {
          const items = list.filter(t => t.cat === cat);
          if (items.length === 0) return;
          const label = document.createElement('div');
          label.className = 'category-label';
          label.textContent = catLabels[cat];
          grid.appendChild(label);
          items.forEach(test => {
            grid.appendChild(makeCard(test, delay));
            delay++;
          });
        });
      }

      countNum.textContent = list.length;
    }

    function makeCard(test, delay) {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = test.folder + '/';
      a.style.animationDelay = `${delay * 0.05}s`;
      a.innerHTML = `
        <div class="card-emoji">${test.emoji}</div>
        <div class="card-body">
          <div class="card-title">${test.title}</div>
          <div class="card-desc">${test.desc}</div>
        </div>
        <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      `;
      return a;
    }

    renderCards(tests);

    searchInput.addEventListener('input', () => {
      const term = searchInput.value.toLowerCase().trim();
      const filtered = tests.filter(t =>
        t.title.toLowerCase().includes(term) ||
        t.desc.toLowerCase().includes(term)
      );
      renderCards(filtered);
    });
  </script>
</body>
</html>

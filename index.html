<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тесты зайки 💖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f001a, #1a0033);
      color: #f0e6ff;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 3.2rem;
      margin: 20px 0 10px;
      background: linear-gradient(90deg, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: #c4b5fd;
      font-size: 1.4rem;
      margin-bottom: 50px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
    }
    .card {
      background: rgba(30, 10, 60, 0.75);
      border-radius: 24px;
      padding: 32px 28px;
      border: 1px solid #6b21a8;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      text-align: center;
    }
    .card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 30px 60px -15px rgba(192, 132, 252, 0.4);
      border-color: #c084fc;
    }
    .emoji {
      font-size: 4.5rem;
      margin-bottom: 20px;
      display: block;
    }
    .card h3 {
      font-size: 1.65rem;
      margin: 0 0 14px;
      color: #e0d4ff;
    }
    .card p {
      color: #c4b5fd;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(45deg, #a855f7, #d946ef);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.6);
    }
    .footer {
      text-align: center;
      margin-top: 60px;
      color: #8b5cf6;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Тесты 💖</h1>
    <p class="subtitle">Выбирай и проходи — всё для тебя 🌙☀️</p>

    <div class="grid" id="quizGrid">
      <!-- Автосписок заполняется JavaScript -->
    </div>

    <div class="footer">
      Сделано с любовью для самой лучшей зайки ❤️<br>
    </div>
  </div>

  <script>
    // === АВТОСПИСОК ===
    // Чтобы добавить новый тест:
    // 1. Создай папку (например love)
    // 2. Положи туда index.html
    // 3. Добавь один объект ниже в массив tests
    const tests = [
      {
        folder: "vibe",
        emoji: "😈🌙",
        title: "В какое время суток твой вайб",
        desc: "Узнай, жаворонок ты или ночной демон"
      },
      {
        folder: "gulyanka",
        emoji: "🌳☀️",
        title: "Когда сегодня идти гулять",
        desc: "Научный тест — идеальное время именно сегодня"
      },
      // ← Добавляй новые тесты сюда ↓
       {
         folder: "love",
         emoji: "❤️",
         title: "Насколько ты влюблён(а)",
         desc: "Серьёзный тест для пары"
      },
{
        folder: "girl-vibe",
        emoji: "🎀🌸",
        title: "Какой ты тип девушки по вайбу",
        desc: "13 вопросов — узнай свою настоящую эстетику!"
      },
      {
        folder: "besit",
        emoji: "🔥😤",
        title: "Как тебя выбесить?",
        desc: "8 вопросов • 100% бесплатно • Наука + юмор"
      },
      {
        folder: "yazik-lubvi",
        emoji: "🔬💖",
        title: "Какой у тебя язык любви? 💖",
        desc: "🔬 На основе реальной психологии 😂 С юмором и мемами"
      },
      {
        folder: "shy",
        emoji: "🙈✨",
        title: "🙈 Тест: Чего ты стесняешься?",
        desc: "шуточный тест с капелькой психологии ✨"
      }
    ];

    const grid = document.getElementById('quizGrid');

    tests.forEach(test => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span class="emoji">${test.emoji}</span>
        <h3>${test.title}</h3>
        <p>${test.desc}</p>
        <a href="${test.folder}/" class="btn">Пройти тест →</a>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Насколько ты влюблён(а)? 💖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #4c1d95, #7e22ce); color: #f3e8ff; margin:0; padding:20px; min-height:100vh; }
    .container { max-width:680px; margin:0 auto; }
    h1 { text-align:center; font-size:2.9rem; margin:30px 0 8px; background:linear-gradient(90deg,#f472b6,#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .subtitle { text-align:center; color:#e0bbff; font-size:1.25rem; margin-bottom:40px; }
    .progress-container { height:8px; background:rgba(236,72,153,0.2); border-radius:9999px; margin-bottom:40px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg,#f472b6,#c084fc); width:0%; transition:width .4s ease; }
    .question-card { background:rgba(30,10,60,0.85); border-radius:28px; padding:40px 35px; border:1px solid #c084fc; min-height:420px; }
    .question-number { color:#f472b6; font-size:1.15rem; margin-bottom:10px; }
    .question-text { font-size:1.6rem; line-height:1.35; margin-bottom:35px; }
    .options { display:flex; flex-direction:column; gap:16px; }
    label { display:flex; align-items:center; padding:20px 24px; background:rgba(50,20,90,0.6); border-radius:20px; cursor:pointer; transition:all .3s; border:2px solid transparent; }
    label:hover { background:rgba(236,72,153,0.3); transform:translateX(10px); }
    label.selected { background:rgba(236,72,153,0.25); border-color:#f472b6; transform:scale(1.03); }
    input[type="radio"] { margin-right:18px; accent-color:#f472b6; transform:scale(1.4); }
    .navigation { display:flex; justify-content:space-between; margin-top:45px; }
    button { padding:16px 42px; font-size:1.2rem; font-weight:600; border-radius:50px; cursor:pointer; border:none; transition:all .3s; }
    #prevBtn { background:transparent; color:#e0bbff; border:2px solid #c084fc; }
    #nextBtn { background:linear-gradient(45deg,#f472b6,#c084fc); color:white; box-shadow:0 10px 30px rgba(244,114,182,0.5); }
    #result { display:none; text-align:center; padding:55px 35px; background:rgba(30,10,60,0.95); border-radius:32px; border:3px dashed #f472b6; margin-top:40px; }
    .emoji-big { font-size:7rem; margin:15px 0 25px; }
    .result-title { font-size:2.6rem; margin:20px 0 15px; background:linear-gradient(90deg,#f472b6,#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Насколько ты влюблён(а)? 💖</h1>
    <p class="subtitle">Честный тест для моей зайки</p>
    <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNum"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="options"></div>
      <div class="navigation">
        <button id="prevBtn" onclick="prevQuestion()">← Назад</button>
        <button id="nextBtn" onclick="nextQuestion()">Далее →</button>
      </div>
    </div>
    <div id="result">
      <div class="emoji-big" id="emoji"></div>
      <div class="result-title" id="resultTitle"></div>
      <div id="resultText" style="font-size:1.35rem;line-height:1.6;color:#e0bbff;"></div>
      <button onclick="restartQuiz()" style="margin-top:35px;background:#f472b6;color:white;">Пройти заново</button>
    </div>
  </div>

  <script>
    const questions = [
      {num:1,text:"Как часто ты думаешь о нём/ней в течение дня?",options:[{t:"Каждую минуту",v:4},{t:"Часто",v:3},{t:"Иногда",v:2},{t:"Редко",v:1}]},
      {num:2,text:"Когда ты видишь его/её имя в уведомлениях, что чувствуешь?",options:[{t:"Сердце выпрыгивает",v:4},{t:"Улыбаюсь сразу",v:3},{t:"Приятно",v:2},{t:"Нормально",v:1}]},
      {num:3,text:"Готова(а) ли отменить свои планы ради встречи?",options:[{t:"Без раздумий",v:4},{t:"Скорее да",v:3},{t:"Зависит",v:2},{t:"Нет",v:1}]},
      {num:4,text:"Сколько раз за день ты проверяешь его/её странички?",options:[{t:"Много раз",v:4},{t:"Пару раз",v:3},{t:"Иногда",v:2},{t:"Почти никогда",v:1}]},
      {num:5,text:"Когда вы не общаетесь, как ты себя чувствуешь?",options:[{t:"Скучаю ужасно",v:4},{t:"Немного грустно",v:3},{t:"Нормально",v:2},{t:"Отдыхаю",v:1}]},
      {num:6,text:"Представляешь ли совместное будущее?",options:[{t:"Постоянно",v:4},{t:"Иногда",v:3},{t:"Редко",v:2},{t:"Нет",v:1}]},
      {num:7,text:"Что ты чувствуешь, когда он/она улыбается тебе?",options:[{t:"Мир останавливается",v:4},{t:"Бабочки в животе",v:3},{t:"Приятно",v:2},{t:"Ничего особенного",v:1}]},
      {num:8,text:"Готова(а) ли сказать «я тебя люблю» первой(ым)?",options:[{t:"Уже готова(а)",v:4},{t:"Почти",v:3},{t:"Скоро",v:2},{t:"Нет",v:1}]}
    ];

    let current = 0, answers = new Array(questions.length).fill(null);

    function render() {
      const q = questions[current];
      document.getElementById('questionNum').textContent = `Вопрос ${q.num} из ${questions.length}`;
      document.getElementById('questionText').textContent = q.text;
      const cont = document.getElementById('options'); cont.innerHTML = '';
      q.options.forEach(opt => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="radio" name="q${current}" value="${opt.v}" ${answers[current]===opt.v?'checked':''}> ${opt.t}`;
        if (answers[current]===opt.v) label.classList.add('selected');
        label.onclick = () => {
          answers[current] = parseInt(opt.v);
          document.querySelectorAll('#options label').forEach(l=>l.classList.remove('selected'));
          label.classList.add('selected');
        };
        cont.appendChild(label);
      });
      document.getElementById('prevBtn').style.display = current===0 ? 'none' : 'block';
      document.getElementById('nextBtn').textContent = current === questions.length-1 ? 'Узнать результат 💖' : 'Далее →';
      document.getElementById('progress').style.width = `${((current+1)/questions.length)*100}%`;
    }

    function next() {
      if (answers[current]===null) { alert("Выбери вариант, зайка 💕"); return; }
      if (current < questions.length-1) { current++; render(); } else { showResult(); }
    }

    function prev() { if (current>0) { current--; render(); } }

    function showResult() {
      const score = answers.reduce((a,b)=>a+b,0);
      const percent = Math.round(score / 32 * 100);
      let title, emoji, text;
      if (score >= 28) { title="ТЫ БЕЗУМНО ВЛЮБЛЁН(А)"; emoji="💖🔥"; text="Это не просто влюблённость — это настоящая любовь. Ты уже не можешь без него/неё."; }
      else if (score >= 22) { title="Сильная влюблённость"; emoji="🌸💘"; text="Бабочки в животе, улыбка 24/7 и мысли только о нём/ней. Почти любовь!"; }
      else if (score >= 15) { title="Лёгкая влюблённость"; emoji="😊💕"; text="Приятные чувства, но ещё не всё серьёзно. Можно развивать дальше."; }
      else { title="Пока только симпатия"; emoji="🌟"; text="Ты заинтересован(а), но до глубоких чувств ещё далеко. Всё впереди!"; }

      document.getElementById('questionCard').style.display='none';
      const res = document.getElementById('result'); res.style.display='block';
      document.getElementById('emoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultText').innerHTML = `<p>${text}</p><br><small style="opacity:0.8">Твой уровень влюблённости: ${percent}%</small>`;
    }

    function restartQuiz() {
      current=0; answers.fill(null);
      document.getElementById('questionCard').style.display='block';
      document.getElementById('result').style.display='none';
      render();
    }

    window.onload = render;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Какой ты клан Пандоры 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030810;--bg2:#061018;
  --surface:rgba(80,200,255,0.03);--surface2:rgba(80,200,255,0.06);--surface3:rgba(80,200,255,0.10);
  --text:#5090b0;--text-dim:#305870;--text-bright:#c0e8ff;
  --border:rgba(80,200,255,0.07);
  --accent:#40d8f0;--accent2:#60f0b0;
  --glow:rgba(64,216,240,0.10);
  --r-accent:#40d8f0;--r-accent2:#60f0b0;--r-bg:#030810;--r-glow:rgba(64,216,240,0.10);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
.cin{font-family:'Cinzel',serif}
.container{max-width:640px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}
canvas#bio{position:fixed;inset:0;z-index:0;pointer-events:none}

.header{text-align:center;padding:44px 0 24px;animation:fadeUp .8s ease}
.header-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:20px}
h1{font-family:'Cinzel',serif;font-size:clamp(2rem,7vw,3rem);font-weight:800;color:var(--text-bright);line-height:1.1;margin-bottom:6px;letter-spacing:1px}
h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h1-sub{font-family:'Cinzel',serif;font-size:clamp(.85rem,2.5vw,1.1rem);color:var(--accent);font-weight:400;letter-spacing:3px;margin-bottom:16px;opacity:.7}
.lead{font-size:14px;color:var(--text-dim);max-width:460px;margin:0 auto;line-height:1.8}

.clan-icons{display:flex;justify-content:center;gap:14px;margin:24px 0;animation:fadeUp .8s ease .1s both}
.clan-orb{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:1.5px solid var(--border);transition:all .5s}
.clan-orb:hover{transform:scale(1.15)}

.btn-start{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px;border:none;border-radius:14px;background:linear-gradient(135deg,rgba(64,216,240,0.12),rgba(96,240,176,0.12));border:1px solid rgba(64,216,240,0.2);color:var(--accent);font-family:'Cinzel',serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s ease;animation:fadeUp .8s ease .25s both;letter-spacing:2px}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 40px var(--glow)}

.progress-container{position:sticky;top:0;z-index:99;background:rgba(3,8,16,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0 10px;margin-bottom:20px;border-bottom:1px solid var(--border);display:none}
.progress-container.active{display:block}
.progress-top{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-label{font-family:'Cinzel',serif;font-size:10px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}
.progress-count{font-size:12px;color:var(--accent);font-weight:700}
.progress-bar{height:2px;background:var(--surface2);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;transition:width .5s ease;width:0}

.q-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:30px 24px;animation:fadeUp .45s ease}
.q-num{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--accent);font-weight:600;margin-bottom:14px}
.q-text{font-size:19px;font-weight:700;color:var(--text-bright);line-height:1.35;margin-bottom:8px;letter-spacing:-.2px}
.q-sub{font-size:13px;font-style:italic;color:var(--text-dim);margin-bottom:22px;line-height:1.6}

.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:var(--surface2);border:1.5px solid transparent;border-radius:14px;cursor:pointer;transition:all .25s ease;font-size:14px;color:var(--text);line-height:1.5;user-select:none}
.option:hover{border-color:rgba(64,216,240,0.12);background:var(--surface3)}
.option.selected{border-color:var(--accent);background:rgba(64,216,240,0.06)}
.opt-emoji{font-size:20px;flex-shrink:0}

.fact-box{margin-top:16px;padding:12px 14px;background:rgba(96,240,176,0.04);border:1px solid rgba(96,240,176,0.1);border-radius:12px;font-size:12px;color:var(--accent2);line-height:1.6;display:none;animation:fadeUp .3s ease}
.fact-box.show{display:block}
.fact-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;opacity:.7}

.btn-next{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Cinzel',serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s ease;margin-top:14px;background:var(--surface2);color:var(--text-dim);opacity:0;pointer-events:none;letter-spacing:1px}
.btn-next.active{opacity:1;pointer-events:all;background:linear-gradient(135deg,rgba(64,216,240,0.12),rgba(96,240,176,0.12));border:1px solid rgba(64,216,240,0.2);color:var(--accent)}

/* ═══ RESULTS ═══ */
.results-section{display:none}
.results-section.active{display:block;animation:fadeUp .8s ease}

.res-banner{position:relative;border-radius:24px;padding:40px 24px 32px;text-align:center;margin-bottom:16px;overflow:hidden;transition:background 1s ease}
.res-glow{position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(60px);opacity:.2;top:-20%;right:-10%;pointer-events:none}
.res-icon{font-size:72px;display:block;margin-bottom:12px;position:relative;z-index:1}
.res-label{font-family:'Cinzel',serif;font-size:10px;text-transform:uppercase;letter-spacing:4px;font-weight:600;margin-bottom:8px;position:relative;z-index:1}
.res-name{font-family:'Cinzel',serif;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;color:#fff;margin-bottom:4px;position:relative;z-index:1;letter-spacing:1px}
.res-name-native{font-family:'Cinzel',serif;font-size:14px;font-style:italic;opacity:.7;margin-bottom:16px;position:relative;z-index:1}
.res-tagline{font-size:15px;color:rgba(255,255,255,.8);max-width:460px;margin:0 auto;line-height:1.7;position:relative;z-index:1}

.r-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px 22px;margin-bottom:14px;transition:border-color .5s}
.r-card h3{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text-bright);margin-bottom:14px;display:flex;align-items:center;gap:10px;letter-spacing:1px}
.r-card p{font-size:14px;color:var(--text-dim);line-height:1.8}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-cell{padding:14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;text-align:center;transition:border-color .5s}
.stat-emoji{font-size:20px;display:block;margin-bottom:4px}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:2px}
.stat-val{font-size:11px;font-weight:600;transition:color .5s}

.trait-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.trait-tag{padding:6px 12px;border-radius:10px;font-size:12px;font-weight:500;transition:all .5s}

.env-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.env-item{padding:12px;background:var(--surface2);border-radius:12px;text-align:center}
.env-icon{font-size:22px;display:block;margin-bottom:4px}
.env-text{font-size:11px;color:var(--text-dim)}

.sc-bars{margin:14px 0 4px}
.sc-row{margin-bottom:12px}
.sc-row-top{display:flex;justify-content:space-between;margin-bottom:4px}
.sc-name{font-size:12px;color:var(--text);font-weight:500}
.sc-val{font-size:11px;font-weight:700}
.sc-bg{height:6px;background:var(--surface2);border-radius:10px;overflow:hidden}
.sc-fill{height:100%;border-radius:10px;transition:width 1.2s ease;width:0}

.gallery-toggle{width:100%;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;color:var(--text-dim);font-family:'Cinzel',serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .3s ease;margin-bottom:14px;letter-spacing:1px}
.gallery-toggle:hover{border-color:var(--r-accent,var(--accent));color:var(--r-accent,var(--accent))}
.gallery{display:none;flex-direction:column;gap:6px;margin-bottom:14px}
.gallery.open{display:flex;animation:fadeUp .4s ease}
.gallery-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.gallery-item.current{border-color:var(--r-accent,var(--accent));background:rgba(64,216,240,0.03)}
.gi-emoji{font-size:22px;flex-shrink:0}
.gi-body{flex:1;min-width:0}
.gi-name{font-size:12px;font-weight:600;color:var(--text-bright)}
.gi-desc{font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gi-badge{font-size:8px;padding:2px 7px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:1px;flex-shrink:0}

.actions{display:flex;flex-direction:column;gap:10px;padding-top:28px;border-top:1px solid var(--border)}
.btn-act{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border-radius:14px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .3s ease;text-decoration:none;letter-spacing:1px}
.btn-primary{color:#fff;border:none}
.btn-primary:hover{transform:translateY(-2px)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--r-accent,var(--accent));color:var(--r-accent,var(--accent))}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform .4s ease;pointer-events:none;color:#fff}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.container{padding:12px 14px 50px}.q-card,.r-card{padding:24px 16px}.q-text{font-size:17px}.option{padding:12px 14px;font-size:13px}.stat-row{grid-template-columns:repeat(2,1fr)}.env-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<canvas id="bio"></canvas>
<div class="container">
  <div id="headerSection">
    <div class="header">
      <div class="header-badge">🌍 Пандора · кланы</div>
      <h1>Какой ты <span>клан</span></h1>
      <div class="h1-sub">Avatar · Pandora · 2154</div>
      <p class="lead">Лес, риф, вулкан, небо или сталь. Каждый клан — не место. Это способ существовать. 14 необычных вопросов — не «что ты любишь», а кто ты есть.</p>
    </div>
    <div class="clan-icons">
      <div class="clan-orb" style="background:rgba(40,180,80,0.12);border-color:rgba(40,180,80,0.2)">🌿</div>
      <div class="clan-orb" style="background:rgba(40,180,220,0.12);border-color:rgba(40,180,220,0.2)">🌊</div>
      <div class="clan-orb" style="background:rgba(232,96,64,0.12);border-color:rgba(232,96,64,0.2)">🔥</div>
      <div class="clan-orb" style="background:rgba(200,210,230,0.12);border-color:rgba(200,210,230,0.2)">💨</div>
      <div class="clan-orb" style="background:rgba(160,170,190,0.12);border-color:rgba(160,170,190,0.2)">🏭</div>
    </div>
    <button class="btn-start" onclick="startTest()">Oel ngati kameie ✦</button>
  </div>
  <div class="progress-container" id="progressBar">
    <div class="progress-top"><span class="progress-label">Tsaheylu</span><span class="progress-count" id="progressCount">01 / 14</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="qContainer"></div>
  <div class="results-section" id="resultsSection"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ═══ CANVAS ═══ */
(function(){const c=document.getElementById('bio'),x=c.getContext('2d');let W,H,ps=[];const cols=['rgba(64,216,240,','rgba(96,240,176,','rgba(144,128,224,','rgba(40,180,200,'];function re(){W=c.width=innerWidth;H=c.height=innerHeight;ps=[];for(let i=0;i<35;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*2.5,vy:-.04-.12*Math.random(),vx:(Math.random()-.5)*.25,a:.05+Math.random()*.15,p:Math.random()*6.28,col:cols[Math.floor(Math.random()*cols.length)]})}function dr(){x.clearRect(0,0,W,H);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=.015;if(p.y<-10){p.y=H+10;p.x=Math.random()*W}if(p.x<0||p.x>W)p.vx*=-1;const a=p.a*(.4+.6*Math.sin(p.p));x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle=p.col+a+')';x.fill();if(p.r>1.8){x.beginPath();x.arc(p.x,p.y,p.r*2.5,0,6.28);x.fillStyle=p.col+(a*.12)+')';x.fill()}});requestAnimationFrame(dr)}re();dr();addEventListener('resize',re)})();

const CL={
  oma:{icon:"🌿",name:"Оматикайя",native:"Omaticaya",color:"#30c060",color2:"#20a048",bg:"linear-gradient(135deg,#0a2018,#082a14)",bannerBg:"linear-gradient(135deg,#0c3020,#0a4028,#082018)",
    tag:"Ты — корень. Не тот, кто растёт быстрее — а тот, кто стоит, когда штормит. Ты не ищешь новое, ты углубляешь имеющееся. Под твоими ногами — связь с тысячелетним лесом.",
    desc:"Оматикайя — Лесной Народ, хранители Древа Голосов и Древа Душ. Они живут в симбиозе с самым плотным биолюминесцентным лесом Пандоры: каждое дерево — нейрон в сети Эйвы, каждый корень — провод связи между мирами живых и мёртвых. Они не кочуют — они врастают. Если ты Оматикайя, ты строишь не дом — ты строишь корневую систему.",
    world:[{e:"🌳",t:"Домашнее Древо (150м)"},{e:"🌺",t:"Биолюминесцентный лес"},{e:"🦎",t:"Банши / Икраны"},{e:"🌙",t:"Древо Душ"}],
    traits:["Традиция","Глубокая связь","Стойкость","Духовность"],
    motto:"Мы не берём у леса. Мы часть леса.",
    shadow:"Ты так глубоко пустил(-а) корни, что забыл(-а): мир больше твоего дерева. Оматикайя потеряли Домашнее Древо — и мир не кончился. Но чуть не кончился они."},
  met:{icon:"🌊",name:"Меткайина",native:"Metkayina",color:"#30b8d0",color2:"#2098b8",bg:"linear-gradient(135deg,#041820,#062838)",bannerBg:"linear-gradient(135deg,#062838,#083848,#041820)",
    tag:"Ты — прилив. Ты приходишь и уходишь, но всегда возвращаешься. Ты не борешься с течением — ты становишься им. Там, где другие тонут, ты дышишь.",
    desc:"Меткайина — Рифовые На'ви с побережья восточного моря Пандоры. Они эволюционировали тысячелетиями: широкие хвосты-вёсла, расширенные грудные клетки, способность задерживать дыхание на 15+ минут. Их философия — путь воды: адаптируйся, обтекай, не ломайся. Если ты Меткайина — ты не сражаешься с волной. Ты ей становишься.",
    world:[{e:"🏝️",t:"Деревня на рифах"},{e:"🐋",t:"Тулкуны (разумные киты)"},{e:"🐠",t:"Подводные леса"},{e:"🌊",t:"Духовный Риф"}],
    traits:["Адаптивность","Терпение","Текучесть","Мирная сила"],
    motto:"Путь воды не имеет начала и конца.",
    shadow:"Ты настолько гибкий(-ая), что иногда теряешь форму. Вода адаптируется — но может и раствориться. Где заканчивается «терпение» и начинается «нет позиции»?"},
  ash:{icon:"🔥",name:"Народ Пепла",native:"Mangkwan",color:"#e06040",color2:"#c04830",bg:"linear-gradient(135deg,#1a0a08,#280e08)",bannerBg:"linear-gradient(135deg,#2a1008,#3a1810,#1a0a08)",
    tag:"Ты — жар, от которого отшатываются. Не потому что ты плохой — потому что ты честный. Ты не улыбаешься, когда не хочешь. Не прощаешь, когда не готов(-а). Ты — настоящий, и это обжигает.",
    desc:"Мангкван — Народ Пепла, первый показанный агрессивный клан На'ви. Живут у вулканов, покрыты пеплом, танцуют вокруг огня. Они заключили союз с RDA — не из предательства, а из прагматизма: выживание важнее идеалов. Кэмерон создал их чтобы показать — На'ви не святые. Они — живые. Если ты Мангкван — ты выбираешь жизнь. Даже если за это осудят.",
    world:[{e:"🌋",t:"Вулканические равнины"},{e:"🔥",t:"Ритуальные огни"},{e:"💀",t:"Пепельная раскраска"},{e:"⚔️",t:"Боевые ящеры"}],
    traits:["Прагматизм","Агрессия","Честность","Выживание"],
    motto:"Пепел не лжёт. Он — то, что остаётся.",
    shadow:"Ты так привык(-ла) выживать, что разучился(-ась) жить. Мангкван сотрудничают с врагом ради безопасности — но какая безопасность на поводке?"},
  wind:{icon:"💨",name:"Торговцы Ветра",native:"Wind Traders",color:"#b0c0d8",color2:"#90a8c0",bg:"linear-gradient(135deg,#0a0e18,#101828)",bannerBg:"linear-gradient(135deg,#121828,#182838,#0a0e18)",
    tag:"Ты — движение без привязки. У тебя нет дома — у тебя есть маршрут. Ты не принадлежишь месту. Ты принадлежишь горизонту.",
    desc:"Торговцы Ветра — кочевой клан На'ви, живущий на гигантских летающих кораблях в верхних слоях атмосферы Пандоры. Первый клан без территории: их дом — небо. Они торгуют между кланами, знают все языки, видели все земли. Если ты Торговец Ветра — ты не беженец. Ты путешественник, который выбрал свободу вместо корней.",
    world:[{e:"🚢",t:"Летающие корабли"},{e:"☁️",t:"Верхняя атмосфера"},{e:"🗺️",t:"Торговые маршруты"},{e:"🦅",t:"Высотные банши"}],
    traits:["Свобода","Любопытство","Дипломатия","Непривязанность"],
    motto:"Тот, кто видел все земли — не принадлежит ни одной.",
    shadow:"Свобода — это красиво. Но иногда это другое слово для «некуда вернуться». Ты знаешь всех — и никто не знает тебя по-настоящему."},
  rda:{icon:"🏭",name:"RDA / Люди",native:"Sky People",color:"#90a0b8",color2:"#708098",bg:"linear-gradient(135deg,#0a0c12,#14181e)",bannerBg:"linear-gradient(135deg,#181c24,#22282e,#0a0c12)",

let curQ=0,selOpt=null;

function startTest(){
  document.getElementById('headerSection').style.display='none';
  document.getElementById('progressBar').classList.add('active');
  showQ(0);
}

function showQ(i){
  const q=questions[i],num=String(i+1).padStart(2,'0');
  selOpt=null;
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">${num} / ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      ${q.sub?`<div class="q-sub">${q.sub}</div>`:''}
      <div class="options">${q.opts.map((o,j)=>`<div class="option" onclick="sel(this,${j})"><span class="opt-emoji">${o.e}</span><span>${o.text}</span></div>`).join('')}</div>
      <div class="fact-box" id="factBox"><div class="fact-label">🌿 Пандора · факт</div>${facts[i]}</div>
      <button class="btn-next" id="btnNext" onclick="nxt()">${i===questions.length-1?'Узнать свой клан ✦':'Дальше →'}</button>
    </div>`;
  document.getElementById('progressCount').textContent=`${num} / ${questions.length}`;
  document.getElementById('progressFill').style.width=`${(i/questions.length)*100}%`;
  window.scrollTo({top:document.getElementById('progressBar').offsetTop-10,behavior:'smooth'});
}

function sel(el,i){
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');selOpt=i;
  document.getElementById('btnNext').classList.add('active');
  document.getElementById('factBox').classList.add('show');
}

function nxt(){
  if(selOpt===null)return;
  const sc=questions[curQ].opts[selOpt].sc;
  for(const[k,v]of Object.entries(sc))scores[k]+=v;
  selOpt=null;curQ++;
  curQ<questions.length?showQ(curQ):showResults();
}

  document.getElementById('progressBar').classList.remove('active');
  document.getElementById('qContainer').innerHTML='';
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);

  root.style.setProperty('--r-accent',cl.color);

  root.style.setProperty('--accent2',cl.color2);
  root.style.setProperty('--glow',cl.color+'20');
  root.style.setProperty('--border',cl.color+'14');
  root.style.setProperty('--text',cl.color+'cc');
  root.style.setProperty('--text-bright','#fff');

function shareShort(){
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const cl=CL[sorted[0][0]];
  const text=`${cl.icon} Мой клан Пандоры — ${cl.name} (${cl.native})\n\n«${cl.motto}»\n\n${cl.tag}\n\n🌿 А ты? https://lisofoxa-oss.github.io/tests/`;
  if(navigator.share)navigator.share({title:'Какой ты клан Пандоры',text}).catch(()=>{});
  else navigator.clipboard.writeText(text).then(()=>showToast('Скопировано!'));
}

function copyFull(){
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const cl=CL[sorted[0][0]],maxVal=Math.max(sorted[0][1],1);
  const bars=sorted.map(([k,v])=>{const p=Math.round((v/maxVal)*100);return`  ${CL[k].icon} ${CL[k].name}: ${'█'.repeat(Math.round(p/10))}${'░'.repeat(10-Math.round(p/10))} ${p}%`;}).join('\n');
  const text=`🌍 КАКОЙ ТЫ КЛАН ПАНДОРЫ\n\n${cl.icon} ${cl.name} · ${cl.native}\n\n«${cl.motto}»\n\n${cl.tag}\n\n📊 Принадлежность:\n${bars}\n\n${cl.desc}\n\n→ https://lisofoxa-oss.github.io/tests/`;
  navigator.clipboard.writeText(text).then(()=>showToast('📋 Скопировано!'));
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.background=CL[Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0]].color;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шкала характера 😇😈</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0a10;--bg2:#141218;
  --surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.05);--surface3:rgba(255,255,255,0.09);
  --text:#9a90a8;--text-dim:#6a6078;--text-bright:#e8e0f0;
  --border:rgba(255,255,255,0.06);
  --angel:#f0d060;--devil:#e04040;--neutral:#a080d0;
  --card-shadow:0 2px 20px rgba(0,0,0,0.3);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
.container{max-width:640px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}

canvas#bgc{position:fixed;inset:0;z-index:0;pointer-events:none}

.header{text-align:center;padding:44px 0 24px;animation:fadeUp .8s ease;position:relative}
.header-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--neutral);font-weight:600;margin-bottom:20px}
.header-icons{font-size:32px;display:flex;justify-content:center;gap:20px;margin-bottom:16px;opacity:.8}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,7.5vw,3.2rem);font-weight:800;color:var(--text-bright);line-height:1.05;margin-bottom:10px;letter-spacing:-1px}
.lead{font-size:14px;color:var(--text-dim);max-width:440px;margin:0 auto;line-height:1.8}

.scale-preview{display:flex;align-items:center;justify-content:center;gap:0;margin:24px auto;max-width:300px;height:6px;border-radius:10px;overflow:hidden;animation:fadeUp .8s ease .1s both}
.sp-left{flex:1;height:100%;background:linear-gradient(90deg,var(--angel),var(--neutral))}
.sp-right{flex:1;height:100%;background:linear-gradient(90deg,var(--neutral),var(--devil))}

.btn-start{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px;border:none;border-radius:14px;background:linear-gradient(135deg,rgba(240,208,96,0.1),rgba(160,128,208,0.1),rgba(224,64,64,0.1));border:1px solid var(--border);color:var(--neutral);font-family:'Playfair Display',serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s ease;animation:fadeUp .8s ease .25s both;letter-spacing:1px}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(160,128,208,0.1)}

.progress-container{position:sticky;top:0;z-index:99;background:rgba(12,10,16,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0 10px;margin-bottom:20px;border-bottom:1px solid var(--border);display:none}
.progress-container.active{display:block}
.progress-top{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-label{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;font-weight:500}
.progress-count{font-size:12px;color:var(--neutral);font-weight:700}
.progress-bar{height:2px;background:var(--surface2);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--angel),var(--neutral),var(--devil));border-radius:10px;transition:width .5s ease;width:0}

.q-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:30px 24px;box-shadow:var(--card-shadow);animation:fadeUp .45s ease}
.q-num{font-size:10px;letter-spacing:2px;color:var(--neutral);font-weight:600;margin-bottom:14px}
.q-text{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--text-bright);line-height:1.3;margin-bottom:8px}
.q-sub{font-size:13px;font-style:italic;color:var(--text-dim);margin-bottom:22px;line-height:1.6}

.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:var(--surface2);border:1.5px solid transparent;border-radius:14px;cursor:pointer;transition:all .25s ease;font-size:14px;color:var(--text);line-height:1.5;user-select:none}
.option:hover{border-color:rgba(160,128,208,0.12);background:var(--surface3)}
.option.selected{border-color:var(--neutral);background:rgba(160,128,208,0.06)}
.opt-emoji{font-size:20px;flex-shrink:0}

.fact-box{margin-top:16px;padding:12px 14px;background:rgba(160,128,208,0.04);border:1px solid rgba(160,128,208,0.08);border-radius:12px;font-size:12px;color:var(--neutral);line-height:1.6;display:none;animation:fadeUp .3s ease}
.fact-box.show{display:block}
.fact-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;opacity:.6}

.btn-next{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s ease;margin-top:14px;background:var(--surface2);color:var(--text-dim);opacity:0;pointer-events:none;letter-spacing:1px}
.btn-next.active{opacity:1;pointer-events:all;background:linear-gradient(135deg,rgba(160,128,208,0.15),rgba(160,128,208,0.08));border:1px solid rgba(160,128,208,0.15);color:var(--neutral)}

/* ═══ RESULTS ═══ */
.results-section{display:none}
.results-section.active{display:block;animation:fadeUp .8s ease}

.res-meter{margin:20px 0 30px;text-align:center}
.meter-bar{position:relative;height:12px;border-radius:10px;overflow:visible;margin:0 20px}
.meter-bg{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--angel) 0%,#d0c060 20%,var(--neutral) 50%,#d06060 80%,var(--devil) 100%)}
.meter-pin{position:absolute;top:50%;width:24px;height:24px;border-radius:50%;border:3px solid #fff;transform:translate(-50%,-50%);box-shadow:0 2px 12px rgba(0,0,0,.4);transition:left 1.5s cubic-bezier(.34,1.56,.64,1)}
.meter-labels{display:flex;justify-content:space-between;margin-top:8px;padding:0 16px}
.meter-label{font-size:11px;font-weight:600}

.res-number{font-family:'Playfair Display',serif;font-size:clamp(4rem,14vw,6rem);font-weight:900;text-align:center;line-height:1;margin:10px 0 4px}
.res-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,2rem);text-align:center;font-weight:700;margin-bottom:4px}
.res-subtitle{text-align:center;font-size:13px;font-style:italic;margin-bottom:20px}

.r-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px 22px;margin-bottom:14px;box-shadow:var(--card-shadow)}
.r-card h3{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--text-bright);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.r-card p{font-size:14px;color:var(--text-dim);line-height:1.8}

.trait-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.trait-tag{padding:5px 12px;border-radius:10px;font-size:12px;font-weight:500}

.duality-bar{margin:14px 0}
.db-row{margin-bottom:10px}
.db-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px}
.db-track{height:6px;border-radius:10px;position:relative;overflow:hidden}
.db-fill-l{position:absolute;left:0;top:0;height:100%;border-radius:10px;transition:width 1.2s ease}
.db-fill-r{position:absolute;right:0;top:0;height:100%;border-radius:10px;transition:width 1.2s ease}
.db-center{position:absolute;left:50%;top:-2px;width:2px;height:10px;background:rgba(255,255,255,.15);transform:translateX(-50%)}

.actions{display:flex;flex-direction:column;gap:10px;padding-top:28px;border-top:1px solid var(--border)}
.btn-act{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border-radius:14px;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .3s ease;text-decoration:none;letter-spacing:.5px}
.btn-primary{color:#fff;border:none}
.btn-primary:hover{transform:translateY(-2px)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--neutral);color:var(--neutral)}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform .4s ease;pointer-events:none;color:#fff}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.container{padding:12px 14px 50px}.q-card,.r-card{padding:24px 16px}.q-text{font-size:18px}.option{padding:12px 14px;font-size:13px}}
</style>
</head>
<body>
<canvas id="bgc"></canvas>
<div class="container">
  <div id="headerSection">
    <div class="header">
      <div class="header-badge">✦ Шкала характера</div>
      <div class="header-icons">😇 ⚖️ 😈</div>
      <h1>Ангел или демон?</h1>
      <p class="lead">14 ситуаций. Шкала от −100 до +100. Никаких очевидных ответов — ты не угадаешь, куда ведёт каждый. Факты о психологии, мифологии и морали между вопросами.</p>
    </div>
    <div class="scale-preview"><div class="sp-left"></div><div class="sp-right"></div></div>
    <button class="btn-start" onclick="startTest()">Узнать своё число ✦</button>
  </div>
  <div class="progress-container" id="progressBar">
    <div class="progress-top"><span class="progress-label">Шкала</span><span class="progress-count" id="progressCount">01 / 14</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="qContainer"></div>
  <div class="results-section" id="resultsSection"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ═══ CANVAS ═══ */
(function(){const c=document.getElementById('bgc'),x=c.getContext('2d');let W,H,ps=[];function re(){W=c.width=innerWidth;H=c.height=innerHeight;ps=[];for(let i=0;i<25;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*2,vy:-.03-.1*Math.random(),vx:(Math.random()-.5)*.2,a:.04+Math.random()*.12,p:Math.random()*6.28,gold:Math.random()>.5})}function dr(){x.clearRect(0,0,W,H);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=.012;if(p.y<-10){p.y=H+10;p.x=Math.random()*W}if(p.x<0||p.x>W)p.vx*=-1;const a=p.a*(.4+.6*Math.sin(p.p));const col=p.gold?`rgba(240,208,96,${a})`:`rgba(224,80,80,${a})`;x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle=col;x.fill();if(p.r>1.5){x.beginPath();x.arc(p.x,p.y,p.r*2.5,0,6.28);x.fillStyle=p.gold?`rgba(240,208,96,${a*.1})`:`rgba(224,80,80,${a*.1})`;x.fill()}});requestAnimationFrame(dr)}re();dr();addEventListener('resize',re)})();

let totalScore=0;

const facts=[
  "В Средневековье считалось, что у каждого человека на левом плече сидит демон, а на правом — ангел. Левшей поэтому считали «дьявольскими».",
  "Психологический эксперимент Милгрэма (1963) показал: 65% обычных людей готовы нанести смертельный удар током, если им скажет авторитетная фигура. Ангелы мы только до первого приказа.",
  "Слово «демон» (δαίμων) в древнегреческом означало просто «дух» или «гений» — без негативной коннотации. Демон Сократа был его внутренним голосом совести.",
  "Исследования Дэниела Батсона показали: люди помогают другим не из чистого альтруизма — а чтобы избавиться от собственного дискомфорта при виде страдания. Даже ангельские поступки — немного эгоистичны.",
  "Люцифер означает «несущий свет». Это был самый красивый ангел — который задал один вопрос: «почему?» За это его изгнали. Любопытство — первый грех.",
  "«Эффект свидетеля»: чем больше людей видят, как кому-то плохо — тем меньше вероятность, что кто-то поможет. В одиночку мы ангелы. В толпе — наблюдатели.",
  "Нимб над головой ангела в искусстве — не религиозный символ. Он пришёл из римских монет, где так обозначали императоров. Святость позаимствовала дизайн у власти.",
  "Концепция «морального лицензирования»: сделав доброе дело, мозг даёт себе разрешение на маленькую подлость. Один хороший поступок буквально развязывает руки для плохого.",
  "В японской мифологии нет строгого деления на добро и зло: духи (ёкаи) бывают добрыми и злыми одновременно — в зависимости от того, как ты с ними обращаешься.",
  "Зеркальные нейроны заставляют нас физически чувствовать чужую боль. Мы буквально не можем не сопереживать — это hardware, не software.",
  "По теории Юнга, «тень» — вытесненная тёмная сторона личности — не враг. Она источник творчества, энергии и интуиции. Без тени нет глубины.",
  "Средневековый каталог «Ars Goetia» описывает 72 демона. У каждого — титул, армия и... специализация. Есть демон, который учит астрономии. Есть — искусству. Зло тоже бывает образованным.",
  "Эксперимент «Стэнфордская тюрьма» (1971): обычные студенты, получив роль «охранников», за 6 дней стали жестокими. Нам не нужен демон — нужна только роль.",
  "В исландской культуре существует «Jólakötturinn» — рождественский кот, который съедает тех, кто не получил новую одежду к Рождеству. Даже праздники содержат угрозу. Мораль и страх всегда рядом."
];

let curQ=0,selOpt=null;

function startTest(){
  document.getElementById('headerSection').style.display='none';
  document.getElementById('progressBar').classList.add('active');
  showQ(0);
}

function showQ(i){
  const q=questions[i],num=String(i+1).padStart(2,'0');
  selOpt=null;
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">${num} / ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      ${q.sub?`<div class="q-sub">${q.sub}</div>`:''}
      <div class="options">${q.opts.map((o,j)=>`<div class="option" onclick="sel(this,${j})"><span class="opt-emoji">${o.e}</span><span>${o.t}</span></div>`).join('')}</div>
      <div class="fact-box" id="factBox"><div class="fact-label">✦ факт</div>${facts[i]}</div>
      <button class="btn-next" id="btnNext" onclick="nxt()">${i===questions.length-1?'Узнать число ✦':'Дальше →'}</button>
    </div>`;
  document.getElementById('progressCount').textContent=`${num} / ${questions.length}`;
  document.getElementById('progressFill').style.width=`${(i/questions.length)*100}%`;
  window.scrollTo({top:document.getElementById('progressBar').offsetTop-10,behavior:'smooth'});
}

function sel(el,i){
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');selOpt=i;
  document.getElementById('btnNext').classList.add('active');
  document.getElementById('factBox').classList.add('show');
}

function nxt(){
  if(selOpt===null)return;
  totalScore+=questions[curQ].opts[selOpt].sc;
  selOpt=null;curQ++;
  curQ<questions.length?showQ(curQ):showResults();
}

function showResults(){
  document.getElementById('progressBar').classList.remove('active');
  document.getElementById('qContainer').innerHTML='';
  const clamped=Math.max(-100,Math.min(100,Math.round(totalScore*1.2)));
  const pct=(clamped+100)/200;
  const tier=tiers.find(t=>clamped>=t.min&&clamped<=t.max)||tiers[3];

  const angelPct=Math.round((1-pct)*100);
  const devilPct=Math.round(pct*100);
  const lerpCol=(a,b,t)=>{const p=parseInt;const ha=a.slice(1),hb=b.slice(1);const r=Math.round(p(ha.slice(0,2),16)*(1-t)+p(hb.slice(0,2),16)*t);const g=Math.round(p(ha.slice(2,4),16)*(1-t)+p(hb.slice(2,4),16)*t);const bl=Math.round(p(ha.slice(4,6),16)*(1-t)+p(hb.slice(4,6),16)*t);return`rgb(${r},${g},${bl})`};
  const mainCol=pct<.5?lerpCol('#f0d060','#a080d0',pct*2):lerpCol('#a080d0','#e04040',(pct-.5)*2);
  const bgCol=pct<.5?lerpCol('#1a1808','#0c0a10',pct*2):lerpCol('#0c0a10','#1a0808',(pct-.5)*2);
  document.body.style.background=bgCol;

  const traitsHTML=tier.traits.map(t=>`<span class="trait-tag" style="background:${mainCol}18;color:${mainCol}">✦ ${t}</span>`).join('');

  const dims=[
    {left:"Эмпатия",right:"Прагматизм",val:pct},
    {left:"Правила",right:"Свобода",val:Math.min(1,pct*1.1+.05)},
    {left:"Прозрачность",right:"Скрытность",val:Math.max(0,pct*.9+.1)},
    {left:"Мягкость",right:"Жёсткость",val:pct}
  ];
  const dimsHTML=dims.map(d=>{
    const lw=Math.round((1-d.val)*50);
    const rw=Math.round(d.val*50);
    return`<div class="db-row"><div class="db-label"><span style="color:var(--angel)">${d.left}</span><span style="color:var(--devil)">${d.right}</span></div><div class="db-track" style="background:var(--surface2)"><div class="db-fill-l" data-w="${lw}" style="background:var(--angel);width:0"></div><div class="db-fill-r" data-w="${rw}" style="background:var(--devil);width:0"></div><div class="db-center"></div></div></div>`;
  }).join('');

  const section=document.getElementById('resultsSection');
  section.classList.add('active');
  section.innerHTML=`
    <div class="res-meter">
      <div class="meter-bar">
        <div class="meter-bg"></div>
        <div class="meter-pin" id="meterPin" style="left:50%;background:${mainCol}"></div>
      </div>
      <div class="meter-labels">
        <span class="meter-label" style="color:var(--angel)">😇 −100</span>
        <span class="meter-label" style="color:var(--neutral)">⚖️ 0</span>
        <span class="meter-label" style="color:var(--devil)">😈 +100</span>
      </div>
    </div>
    <div class="res-number" style="color:${mainCol}">${clamped>0?'+':''}${clamped}</div>
    <div class="res-title" style="color:${mainCol}">${tier.icon} ${tier.title}</div>
    <div class="res-subtitle" style="color:${mainCol}90">${tier.sub}</div>

    <div class="r-card"><h3>✦ Характеристика</h3><p>${tier.desc}</p></div>

    <div class="r-card"><h3>📊 Черты</h3><div class="trait-row">${traitsHTML}</div></div>

    <div class="r-card"><h3>⚖️ Баланс</h3><div class="duality-bar">${dimsHTML}</div></div>

    <div class="r-card"><h3>🌑 Обратная сторона</h3><p>${tier.shadow}</p></div>

    <div class="r-card"><h3>🧬 Ангельский состав</h3><p>😇 ${angelPct}% ангел · 😈 ${devilPct}% демон</p></div>

    <div class="actions">
      <button class="btn-act btn-primary" style="background:${mainCol}" onclick="shareShort()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg> Отправить другу</button>
      <button class="btn-act btn-secondary" onclick="copyFull()">📋 Скопировать</button>
      <a href="https://lisofoxa-oss.github.io/tests/" class="btn-act btn-secondary">🧪 Ещё тесты</a>
      <button class="btn-act btn-ghost" onclick="location.reload()">↻ Перекалибровать</button>
    </div>`;
  setTimeout(()=>{
    document.getElementById('meterPin').style.left=`${pct*100}%`;
    document.querySelectorAll('.db-fill-l').forEach(b=>b.style.width=b.dataset.w+'%');
    document.querySelectorAll('.db-fill-r').forEach(b=>b.style.width=b.dataset.w+'%');
  },400);
  window.scrollTo({top:0,behavior:'smooth'});
}

function shareShort(){
  const clamped=Math.max(-100,Math.min(100,Math.round(totalScore*1.2)));
  const tier=tiers.find(t=>clamped>=t.min&&clamped<=t.max)||tiers[3];
  const text=`${tier.icon} Мой результат: ${clamped>0?'+':''}${clamped} из 100\n\n${tier.title}\n${tier.sub}\n\n😇😈 А ты? https://lisofoxa-oss.github.io/tests/`;
  if(navigator.share)navigator.share({title:'Ангел или демон?',text}).catch(()=>{});
  else navigator.clipboard.writeText(text).then(()=>showToast('Скопировано!'));
}

function copyFull(){
  const clamped=Math.max(-100,Math.min(100,Math.round(totalScore*1.2)));
  const pct=(clamped+100)/200;
  const tier=tiers.find(t=>clamped>=t.min&&clamped<=t.max)||tiers[3];
  const text=`😇😈 АНГЕЛ ИЛИ ДЕМОН?\n\n${tier.icon} ${tier.title}\n${tier.sub}\n\nШкала: ${clamped>0?'+':''}${clamped} / 100\n😇 ${Math.round((1-pct)*100)}% ангел · 😈 ${Math.round(pct*100)}% демон\n\n«${tier.desc}»\n\n🌑 ${tier.shadow}\n\n→ https://lisofoxa-oss.github.io/tests/`;
  navigator.clipboard.writeText(text).then(()=>showToast('📋 Скопировано!'));
}

function showToast(msg){const clamped=Math.max(-100,Math.min(100,Math.round(totalScore*1.2)));const pct=(clamped+100)/200;const t=document.getElementById('toast');t.textContent=msg;t.style.background=pct<.5?'var(--angel)':'var(--devil)';t.style.color=pct<.5?'#1a1808':'#fff';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
</script>

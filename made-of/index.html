<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Из чего ты сделан(-а) ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080e;--bg-rgb:8,8,14;
  --surface:rgba(160,140,255,0.03);--surface2:rgba(160,140,255,0.06);--surface3:rgba(160,140,255,0.10);
  --text:#8a88a8;--text-dim:#58586a;--text-bright:#d4d0f0;
  --border:rgba(160,140,255,0.07);
  --p1:#a07cff;--p2:#60c0e0;--p3:#ff7aaa;--p4:#ffc060;--p5:#5aea8a;
  --glow1:rgba(160,124,255,0.10);--glow2:rgba(96,192,224,0.10);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6;-webkit-user-select:none;user-select:none}
.sg{font-family:'Space Grotesk',sans-serif}
.container{max-width:640px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}

/* Aurora bg */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3}
.aurora-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:float 20s ease-in-out infinite}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.1)}66%{transform:translate(-20px,30px) scale(.9)}}

.header{text-align:center;padding:40px 0 24px;animation:fadeUp .8s ease}
.header-badge{font-family:'Space Grotesk',sans-serif;display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--p1);font-weight:500;margin-bottom:20px}
.header-icon{font-size:48px;display:block;margin-bottom:16px;opacity:.8}
h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,7vw,3rem);font-weight:700;color:var(--text-bright);line-height:1.1;margin-bottom:14px;letter-spacing:-1px}
h1 em{font-style:normal;background:linear-gradient(135deg,var(--p1),var(--p2),var(--p3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lead{font-size:15px;color:var(--text-dim);max-width:440px;margin:0 auto;line-height:1.7;font-weight:300}

.mech-preview{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:24px 0;animation:fadeUp .8s ease .15s both}
.mp-tag{padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--text-dim);font-weight:500}

.btn-start{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s ease;animation:fadeUp .8s ease .3s both;box-shadow:0 6px 30px var(--glow1)}
.btn-start:hover{transform:translateY(-3px)}

.progress-container{position:sticky;top:0;z-index:99;background:rgba(var(--bg-rgb),0.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0 10px;margin-bottom:20px;border-bottom:1px solid var(--border);display:none}
.progress-container.active{display:block}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}
.progress-count{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--p1);font-weight:700}
.progress-bar{height:2px;background:var(--surface2);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p1),var(--p2),var(--p3));border-radius:10px;transition:width .5s ease;width:0}
.mech-label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--p2);text-align:center;margin-top:6px;letter-spacing:1px;text-transform:uppercase}

.q-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:30px 24px;animation:fadeUp .45s ease}
.q-num{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:3px;color:var(--p1);font-weight:600;margin-bottom:4px}
.q-mech{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:2px;color:var(--p2);text-transform:uppercase;margin-bottom:14px}
.q-text{font-size:20px;font-weight:700;color:var(--text-bright);line-height:1.35;margin-bottom:8px;letter-spacing:-.3px}
.q-sub{font-size:13px;font-style:italic;color:var(--text-dim);margin-bottom:24px;line-height:1.6}

/* ─── MECHANIC: SLIDER ─── */
.slider-wrap{padding:10px 0 20px}
.slider-labels{display:flex;justify-content:space-between;margin-bottom:12px}
.slider-label{font-size:13px;font-weight:600;max-width:40%;text-align:center}
.slider-input{-webkit-appearance:none;width:100%;height:6px;border-radius:6px;background:linear-gradient(90deg,var(--p1),var(--p2));outline:none;cursor:pointer}
.slider-input::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 0 12px var(--glow1);cursor:grab}
.slider-input::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 0 12px var(--glow1);cursor:grab;border:none}
.slider-val{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--text-bright);margin-top:12px}

/* ─── MECHANIC: 2D PICKER ─── */
.picker2d{position:relative;width:100%;aspect-ratio:1;background:radial-gradient(ellipse at center,rgba(160,124,255,0.06),rgba(96,192,224,0.04),transparent);border:1px solid var(--border);border-radius:16px;cursor:crosshair;touch-action:none;margin-bottom:8px}
.picker2d-axis{position:absolute;font-size:11px;font-weight:600;color:var(--text-dim)}
.picker2d-dot{position:absolute;width:20px;height:20px;border-radius:50%;background:var(--p1);box-shadow:0 0 16px var(--glow1);transform:translate(-50%,-50%);transition:left .15s,top .15s;display:none}
.picker2d-crossh,.picker2d-crossv{position:absolute;background:rgba(160,124,255,0.1);display:none}
.picker2d-crossh{height:1px;left:0;right:0}
.picker2d-crossv{width:1px;top:0;bottom:0}

/* ─── MECHANIC: RANK ─── */
.rank-items{display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface2);border:1.5px solid transparent;border-radius:14px;cursor:pointer;transition:all .3s ease;font-size:14px;color:var(--text)}
.rank-item:hover{border-color:rgba(160,124,255,0.12)}
.rank-item.ranked{border-color:var(--p1);background:rgba(160,124,255,0.06)}
.rank-num{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--text-dim);transition:all .25s;flex-shrink:0}
.rank-item.ranked .rank-num{border-color:var(--p1);background:var(--p1);color:#fff}

/* ─── MECHANIC: COLOR PICK ─── */
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:10px 0}
.color-swatch{aspect-ratio:1;border-radius:14px;cursor:pointer;border:3px solid transparent;transition:all .25s;position:relative}
.color-swatch:hover{transform:scale(1.05)}
.color-swatch.picked{border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,0.2)}
.color-swatch.picked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.color-swatch.disabled{opacity:.25;pointer-events:none}
.color-count{text-align:center;font-size:12px;color:var(--text-dim);margin-top:4px}

/* ─── MECHANIC: SWIPE ─── */
.swipe-area{position:relative;height:200px;display:flex;align-items:center;justify-content:center;margin:10px 0}
.swipe-card{position:absolute;width:85%;max-width:300px;padding:30px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;text-align:center;transition:transform .4s ease,opacity .4s ease}
.swipe-card.gone-left{transform:translateX(-150%) rotate(-15deg);opacity:0}
.swipe-card.gone-right{transform:translateX(150%) rotate(15deg);opacity:0}
.swipe-word{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--text-bright)}
.swipe-hint{font-size:12px;color:var(--text-dim);margin-top:8px}
.swipe-btns{display:flex;justify-content:center;gap:20px;margin-top:10px}
.swipe-btn{width:56px;height:56px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .25s}
.swipe-btn:hover{transform:scale(1.1)}
.swipe-btn.no:hover{border-color:var(--p3);background:rgba(255,122,170,0.08)}
.swipe-btn.yes:hover{border-color:var(--p5);background:rgba(90,234,138,0.08)}
.swipe-progress{text-align:center;font-size:11px;color:var(--text-dim);margin-top:8px}

/* ─── MECHANIC: BUCKETS ─── */
.bucket-items{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;min-height:44px}
.bucket-chip{padding:8px 16px;background:var(--surface3);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text-bright);cursor:pointer;transition:all .25s;font-weight:500}
.bucket-chip:hover{border-color:var(--p1)}
.bucket-chip.active{border-color:var(--p1);background:rgba(160,124,255,0.12);box-shadow:0 0 12px var(--glow1)}
.buckets{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.bucket{min-height:120px;padding:14px;background:var(--surface);border:2px dashed var(--border);border-radius:16px;text-align:center;cursor:pointer;transition:all .25s}
.bucket:hover{border-color:rgba(160,124,255,0.2)}
.bucket.highlight{border-color:var(--p1);background:rgba(160,124,255,0.04)}
.bucket-title{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.bucket-items-in{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.bucket-placed{padding:5px 10px;background:var(--surface3);border-radius:8px;font-size:11px;color:var(--text);font-weight:500}

/* ─── MECHANIC: TIMED ─── */
.timer-bar{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:16px}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--p5),var(--p4),var(--p3));border-radius:4px;transition:width .1s linear}
.timer-num{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;text-align:center;color:var(--text-bright);margin-bottom:16px}
.timed-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.timed-opt{padding:24px 14px;background:var(--surface2);border:2px solid transparent;border-radius:18px;text-align:center;cursor:pointer;transition:all .25s}
.timed-opt:hover{border-color:rgba(160,124,255,0.15)}
.timed-opt.selected{border-color:var(--p1);background:rgba(160,124,255,0.08)}
.timed-opt .to-emoji{font-size:32px;display:block;margin-bottom:8px}
.timed-opt .to-text{font-size:14px;font-weight:600;color:var(--text-bright)}
.timed-expired{text-align:center;font-size:14px;color:var(--p3);font-style:italic;margin-top:12px;animation:fadeUp .3s ease}

/* ─── MECHANIC: DOT SCALE ─── */
.dot-scale{display:flex;justify-content:space-between;align-items:center;padding:20px 0}
.dot{width:clamp(28px,7vw,44px);height:clamp(28px,7vw,44px);border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all .3s ease;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:transparent}
.dot:hover{border-color:var(--p1);transform:scale(1.1)}
.dot.active{background:var(--p1);border-color:var(--p1);color:#fff;box-shadow:0 0 16px var(--glow1)}
.dot-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim)}

.btn-next{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s ease;margin-top:16px;background:var(--surface2);color:var(--text-dim);opacity:0;pointer-events:none}
.btn-next.active{opacity:1;pointer-events:all;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;box-shadow:0 4px 16px var(--glow1)}

/* ═══ RESULTS ═══ */
.results-section{display:none}
.results-section.active{display:block;animation:fadeUp .8s ease}
.r-hero{text-align:center;padding:36px 0 20px}
.r-icon{font-size:56px;display:block;margin-bottom:12px}
.r-label{font-family:'Space Grotesk',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:3px;font-weight:600;color:var(--p1);margin-bottom:8px}
.r-name{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.6rem,5.5vw,2.2rem);font-weight:700;color:var(--text-bright);margin-bottom:6px}
.r-tagline{font-size:15px;font-style:italic;color:var(--text);max-width:440px;margin:0 auto 24px;line-height:1.7}

/* Composition visual */
.comp-bar{display:flex;height:12px;border-radius:12px;overflow:hidden;margin-bottom:16px}
.comp-seg{transition:width 1.2s ease}
.comp-legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.comp-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text)}
.comp-dot{width:8px;height:8px;border-radius:50%}

.r-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px 22px;margin-bottom:14px}
.r-card h3{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--text-bright);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.r-card p{font-size:14px;color:var(--text-dim);line-height:1.8;font-weight:300}

.sc-bars{margin:14px 0 4px}
.sc-row{margin-bottom:14px}
.sc-row-top{display:flex;justify-content:space-between;margin-bottom:4px}
.sc-name{font-size:12px;color:var(--text);font-weight:500}
.sc-val{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700}
.sc-bg{height:6px;background:var(--surface2);border-radius:10px;overflow:hidden}
.sc-fill{height:100%;border-radius:10px;transition:width 1.2s ease;width:0}

.actions{display:flex;flex-direction:column;gap:10px;padding-top:28px;border-top:1px solid var(--border)}
.btn-act{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border-radius:14px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s ease;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none}
.btn-primary:hover{transform:translateY(-2px)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--p1);color:var(--p1)}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);font-weight:500}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--p1);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform .4s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.container{padding:12px 14px 50px}.q-card,.r-card{padding:24px 16px}.q-text{font-size:18px}}
</style>
</head>
<body>
<div class="aurora">
  <div class="aurora-orb" style="width:300px;height:300px;top:10%;left:20%;background:rgba(160,124,255,0.08);animation-delay:0s"></div>
  <div class="aurora-orb" style="width:250px;height:250px;top:50%;right:10%;background:rgba(96,192,224,0.06);animation-delay:7s"></div>
  <div class="aurora-orb" style="width:200px;height:200px;bottom:20%;left:30%;background:rgba(255,122,170,0.05);animation-delay:14s"></div>
</div>
<div class="container">
  <div id="headerSection">
    <div class="header">
      <div class="header-badge">✦ тест-витрина</div>
      <span class="header-icon">✦</span>
      <h1>Из чего ты <em>сделан(-а)</em></h1>
      <p class="lead">8 вопросов. Каждый — новый способ ответить. Слайдеры, карты, свайпы, таймеры. Ты не выбираешь ответ — ты его чувствуешь.</p>
    </div>
    <div class="mech-preview">
      <span class="mp-tag">🎚️ Слайдер</span>
      <span class="mp-tag">📍 2D-карта</span>
      <span class="mp-tag">🏆 Ранжирование</span>
      <span class="mp-tag">🎨 Цвета</span>
      <span class="mp-tag">👆 Свайпы</span>
      <span class="mp-tag">📦 Сортировка</span>
      <span class="mp-tag">⏱️ Таймер</span>
      <span class="mp-tag">🔘 Шкала</span>
    </div>
    <button class="btn-start" onclick="startTest()">Начать ✦</button>
  </div>
  <div class="progress-container" id="progressBar">
    <div class="progress-top"><span class="progress-label">Состав</span><span class="progress-count" id="progressCount">1 / 8</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="mech-label" id="mechLabel"></div>
  </div>
  <div id="qContainer"></div>
  <div class="results-section" id="resultsSection"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* Scales: fire, water, light, root, chaos */
const scaleNames={fire:'Огонь',water:'Вода',light:'Свет',root:'Корни',chaos:'Хаос'};
const scaleColors={fire:'#ff7aaa',water:'#60c0e0',light:'#ffc060',root:'#5aea8a',chaos:'#a07cff'};
const scaleEmoji={fire:'🔥',water:'💧',light:'✨',root:'🌿',chaos:'🌀'};
let sc={fire:0,water:0,light:0,root:0,chaos:0};
let curQ=0,ready=false;

const mechs=['🎚️ СПЕКТР','📍 КООРДИНАТЫ','🏆 ПРИОРИТЕТЫ','🎨 ПАЛИТРА','👆 СВАЙП','📦 СОРТИРОВКА','⏱️ 5 СЕКУНД','🔘 ШКАЛА'];

function startTest(){
  document.getElementById('headerSection').style.display='none';
  document.getElementById('progressBar').classList.add('active');
  showQ(0);
}

function updProgress(){
  document.getElementById('progressCount').textContent=`${curQ+1} / 8`;
  document.getElementById('progressFill').style.width=`${(curQ/8)*100}%`;
  document.getElementById('mechLabel').textContent=mechs[curQ]||'';
}

function enableNext(){
  ready=true;
  document.getElementById('btnNext').classList.add('active');
}

function showQ(i){
  curQ=i;ready=false;
  updProgress();
  const renders=[renderSlider,render2D,renderRank,renderColor,renderSwipe,renderBucket,renderTimed,renderDots];
  renders[i]();
  window.scrollTo({top:document.getElementById('progressBar').offsetTop-10,behavior:'smooth'});
}

function nxt(){
  if(!ready)return;
  curQ++;
  curQ<8?showQ(curQ):showResults();
}

/* ═══ Q1: SLIDER ═══ */
function renderSlider(){
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">01 / 08</div><div class="q-mech">🎚️ Спектр</div>
      <div class="q-text">Между тишиной и шумом — где ты?</div>
      <div class="q-sub">Двигай ползунок. Не думай. Чувствуй.</div>
      <div class="slider-wrap">
        <div class="slider-labels">
          <span class="slider-label" style="color:var(--p2)">🤫 Тишина</span>
          <span class="slider-label" style="color:var(--p3)">📢 Шум</span>
        </div>
        <input type="range" class="slider-input" id="sl" min="0" max="100" value="50" oninput="sliderChange(this.value)">
        <div class="slider-val" id="slVal">50</div>
      </div>
      <button class="btn-next active" id="btnNext" onclick="submitSlider()">Дальше →</button>
    </div>`;
  ready=true;
}
function sliderChange(v){document.getElementById('slVal').textContent=v}
function submitSlider(){
  const v=+document.getElementById('sl').value;
  sc.water+=Math.round((100-v)/20);sc.fire+=Math.round(v/20);
  sc.root+=v<30?2:0;sc.chaos+=v>70?2:0;
  nxt();
}

/* ═══ Q2: 2D PICKER ═══ */
function render2D(){
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">02 / 08</div><div class="q-mech">📍 Координаты</div>
      <div class="q-text">Нажми на поле. Где ты?</div>
      <div class="q-sub">Вертикаль: голова ↔ сердце. Горизонталь: порядок ↔ хаос.</div>
      <div class="picker2d" id="p2d" onclick="pick2d(event)" ontouchmove="pick2dTouch(event)">
        <span class="picker2d-axis" style="top:6px;left:50%;transform:translateX(-50%)">🧠 Голова</span>
        <span class="picker2d-axis" style="bottom:6px;left:50%;transform:translateX(-50%)">❤️ Сердце</span>
        <span class="picker2d-axis" style="left:6px;top:50%;transform:translateY(-50%)">📐 Порядок</span>
        <span class="picker2d-axis" style="right:6px;top:50%;transform:translateY(-50%)">🌀 Хаос</span>
        <div class="picker2d-crossh" id="p2dH"></div>
        <div class="picker2d-crossv" id="p2dV"></div>
        <div class="picker2d-dot" id="p2dDot"></div>
      </div>
      <button class="btn-next" id="btnNext" onclick="submit2D()">Дальше →</button>
    </div>`;
}
let p2dX=50,p2dY=50;
function pick2d(e){
  const r=document.getElementById('p2d').getBoundingClientRect();
  p2dX=Math.round(((e.clientX-r.left)/r.width)*100);
  p2dY=Math.round(((e.clientY-r.top)/r.height)*100);
  updateDot();
}
function pick2dTouch(e){
  e.preventDefault();
  const t=e.touches[0],r=document.getElementById('p2d').getBoundingClientRect();
  p2dX=Math.max(0,Math.min(100,Math.round(((t.clientX-r.left)/r.width)*100)));
  p2dY=Math.max(0,Math.min(100,Math.round(((t.clientY-r.top)/r.height)*100)));
  updateDot();
}
function updateDot(){
  const d=document.getElementById('p2dDot'),h=document.getElementById('p2dH'),v=document.getElementById('p2dV');
  d.style.display='block';d.style.left=p2dX+'%';d.style.top=p2dY+'%';
  h.style.display='block';h.style.top=p2dY+'%';
  v.style.display='block';v.style.left=p2dX+'%';
  enableNext();
}
function submit2D(){
  if(!ready)return;
  sc.chaos+=Math.round(p2dX/25);sc.root+=Math.round((100-p2dX)/25);
  sc.light+=Math.round((100-p2dY)/25);sc.water+=Math.round(p2dY/25);
  nxt();
}

/* ═══ Q3: RANK ═══ */
let rankOrder=[];
const rankItems=['Свобода','Безопасность','Смысл','Любовь','Сила'];
const rankSc=[{chaos:3,fire:1},{root:3,water:1},{light:3},{water:3,root:1},{fire:3}];
function renderRank(){
  rankOrder=[];
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">03 / 08</div><div class="q-mech">🏆 Приоритеты</div>
      <div class="q-text">Расставь по важности. Жми по порядку: 1-е, 2-е, 3-е...</div>
      <div class="q-sub">Первое — самое важное.</div>
      <div class="rank-items" id="rankWrap">${rankItems.map((r,i)=>`<div class="rank-item" data-idx="${i}" onclick="rankClick(this,${i})"><div class="rank-num">—</div><span>${r}</span></div>`).join('')}</div>
      <button class="btn-next" id="btnNext" onclick="submitRank()">Дальше →</button>
    </div>`;
}
function rankClick(el,i){
  if(el.classList.contains('ranked'))return;
  rankOrder.push(i);el.classList.add('ranked');
  el.querySelector('.rank-num').textContent=rankOrder.length;
  if(rankOrder.length>=5)enableNext();
}
function submitRank(){
  if(!ready)return;
  const w=[1,.7,.4,.2,.1];
  rankOrder.forEach((idx,pos)=>{
    const s=rankSc[idx];
    for(const[k,v]of Object.entries(s))sc[k]+=Math.round(v*w[pos]*10)/10;
  });
  nxt();
}

/* ═══ Q4: COLOR PICK ═══ */
let pickedColors=[];
const palette=['#ff4d6a','#ff8c42','#ffd166','#a8e06c','#42d6a4','#4ecdc4','#5b9bd5','#7c6bf0','#c77dff','#ff6b9d','#2d3436','#dfe6e9','#fdcb6e','#e17055','#00b894'];
const colorMap={0:'fire',1:'fire',2:'light',3:'root',4:'root',5:'water',6:'water',7:'chaos',8:'chaos',9:'fire',10:'root',11:'light',12:'light',13:'fire',14:'water'};
function renderColor(){
  pickedColors=[];
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">04 / 08</div><div class="q-mech">🎨 Палитра</div>
      <div class="q-text">Выбери 3 цвета, из которых ты сделан(-а)</div>
      <div class="q-sub">Не думай. Какие тянут?</div>
      <div class="color-grid" id="colorGrid">${palette.map((c,i)=>`<div class="color-swatch" style="background:${c}" data-idx="${i}" onclick="pickColor(this,${i})"></div>`).join('')}</div>
      <div class="color-count" id="colorCount">Выбрано: 0 / 3</div>
      <button class="btn-next" id="btnNext" onclick="submitColor()">Дальше →</button>
    </div>`;
}
function pickColor(el,i){
  if(el.classList.contains('picked')){
    el.classList.remove('picked');
    pickedColors=pickedColors.filter(x=>x!==i);
  } else {
    if(pickedColors.length>=3)return;
    el.classList.add('picked');
    pickedColors.push(i);
  }
  document.querySelectorAll('.color-swatch').forEach(s=>{
    if(!s.classList.contains('picked')&&pickedColors.length>=3)s.classList.add('disabled');
    else s.classList.remove('disabled');
  });
  document.getElementById('colorCount').textContent=`Выбрано: ${pickedColors.length} / 3`;
  if(pickedColors.length===3)enableNext();else{ready=false;document.getElementById('btnNext').classList.remove('active')}
}
function submitColor(){
  if(!ready)return;
  pickedColors.forEach(i=>{sc[colorMap[i]]+=2});
  nxt();
}

/* ═══ Q5: SWIPE ═══ */
const swipeWords=['Риск','Покой','Одиночество','Нежность','Контроль','Бунт','Тепло','Тайна'];
const swipeYes={0:{fire:2,chaos:1},1:{water:2,root:1},2:{root:1,chaos:1},3:{water:2},4:{root:2},5:{chaos:2,fire:1},6:{water:1,light:1},7:{chaos:1,light:1}};
const swipeNo={0:{water:1},1:{fire:1},2:{water:1},3:{fire:1},4:{chaos:1},5:{root:1},6:{fire:1},7:{root:1}};
let swipeIdx=0;
function renderSwipe(){
  swipeIdx=0;
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">05 / 08</div><div class="q-mech">👆 Свайп</div>
      <div class="q-text">Это про тебя? Да или нет. Быстро.</div>
      <div class="q-sub">8 слов. Не думай — чувствуй.</div>
      <div class="swipe-area" id="swipeArea"><div class="swipe-card" id="swipeCard"><div class="swipe-word" id="swipeWord">${swipeWords[0]}</div><div class="swipe-hint">это про тебя?</div></div></div>
      <div class="swipe-btns"><button class="swipe-btn no" onclick="swipeAns(false)">✕</button><button class="swipe-btn yes" onclick="swipeAns(true)">✓</button></div>
      <div class="swipe-progress" id="swipeProg">1 / 8</div>
      <button class="btn-next" id="btnNext" onclick="nxt()" style="display:none">Дальше →</button>
    </div>`;
}
function swipeAns(yes){
  const card=document.getElementById('swipeCard');
  card.classList.add(yes?'gone-right':'gone-left');
  const s=yes?swipeYes[swipeIdx]:swipeNo[swipeIdx];
  for(const[k,v]of Object.entries(s))sc[k]+=v;
  swipeIdx++;
  if(swipeIdx>=swipeWords.length){
    setTimeout(()=>{
      document.getElementById('swipeArea').innerHTML='<div style="font-size:14px;color:var(--text-dim);font-style:italic">Готово ✦</div>';
      const btn=document.getElementById('btnNext');btn.style.display='block';enableNext();
    },400);return;
  }
  setTimeout(()=>{
    card.className='swipe-card';
    document.getElementById('swipeWord').textContent=swipeWords[swipeIdx];
    document.getElementById('swipeProg').textContent=`${swipeIdx+1} / 8`;
  },400);
}

/* ═══ Q6: BUCKETS ═══ */
const bucketWords=['Гнев','Нежность','Тревога','Уверенность','Грусть','Азарт','Стыд','Спокойствие'];
const bucketShowSc={0:{fire:2},1:{water:1,light:1},2:{water:1},3:{fire:1,root:1},4:{water:2},5:{fire:1,chaos:1},6:{root:1},7:{root:1,water:1}};
const bucketHideSc={0:{root:1,chaos:1},1:{chaos:1},2:{chaos:1,root:1},3:{light:1},4:{light:1},5:{root:1},6:{chaos:1,fire:1},7:{chaos:1}};
let bSelected=null,bucketState={show:[],hide:[]};
function renderBucket(){
  bSelected=null;bucketState={show:[],hide:[]};
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">06 / 08</div><div class="q-mech">📦 Сортировка</div>
      <div class="q-text">Разложи: что показываешь миру, а что прячешь?</div>
      <div class="q-sub">Нажми на слово, потом на корзину.</div>
      <div class="bucket-items" id="bItems">${bucketWords.map((w,i)=>`<span class="bucket-chip" data-idx="${i}" onclick="bSel(this,${i})">${w}</span>`).join('')}</div>
      <div class="buckets">
        <div class="bucket" id="bucketShow" onclick="bPlace('show')"><div class="bucket-title">☀️ Показываю</div><div class="bucket-items-in" id="bShowIn"></div></div>
        <div class="bucket" id="bucketHide" onclick="bPlace('hide')"><div class="bucket-title">🌙 Прячу</div><div class="bucket-items-in" id="bHideIn"></div></div>
      </div>
      <button class="btn-next" id="btnNext" onclick="submitBucket()">Дальше →</button>
    </div>`;
}
function bSel(el,i){
  document.querySelectorAll('.bucket-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');bSelected=i;
  document.querySelectorAll('.bucket').forEach(b=>b.classList.add('highlight'));
}
function bPlace(which){
  if(bSelected===null)return;
  bucketState[which].push(bSelected);
  const chip=document.querySelector(`.bucket-chip[data-idx="${bSelected}"]`);
  chip.style.display='none';
  document.getElementById(which==='show'?'bShowIn':'bHideIn').innerHTML+=`<span class="bucket-placed">${bucketWords[bSelected]}</span>`;
  bSelected=null;
  document.querySelectorAll('.bucket-chip').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.bucket').forEach(b=>b.classList.remove('highlight'));
  if(bucketState.show.length+bucketState.hide.length>=8)enableNext();
}
function submitBucket(){
  if(!ready)return;
  bucketState.show.forEach(i=>{for(const[k,v]of Object.entries(bucketShowSc[i]))sc[k]+=v});
  bucketState.hide.forEach(i=>{for(const[k,v]of Object.entries(bucketHideSc[i]))sc[k]+=v});
  nxt();
}

/* ═══ Q7: TIMED ═══ */
let timerInterval,timerExpired=false;
function renderTimed(){
  timerExpired=false;
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">07 / 08</div><div class="q-mech">⏱️ 5 секунд</div>
      <div class="q-text">Что ближе? Быстро.</div>
      <div class="q-sub">Нажми «Готов(-а)» — таймер пойдёт.</div>
      <div id="timedPhase1"><button class="btn-next active" style="opacity:1;pointer-events:all" onclick="startTimer()">Готов(-а) ⏱️</button></div>
      <div id="timedPhase2" style="display:none">
        <div class="timer-num" id="tNum">5</div>
        <div class="timer-bar"><div class="timer-fill" id="tFill" style="width:100%"></div></div>
        <div class="timed-opts">
          <div class="timed-opt" onclick="timedPick(0)"><span class="to-emoji">🌊</span><span class="to-text">Глубина</span></div>
          <div class="timed-opt" onclick="timedPick(1)"><span class="to-emoji">⚡</span><span class="to-text">Высота</span></div>
        </div>
        <div id="timedMsg"></div>
      </div>
      <button class="btn-next" id="btnNext" onclick="nxt()" style="display:none">Дальше →</button>
    </div>`;
}
function startTimer(){
  document.getElementById('timedPhase1').style.display='none';
  document.getElementById('timedPhase2').style.display='block';
  let left=50;
  timerInterval=setInterval(()=>{
    left--;
    document.getElementById('tFill').style.width=left*2+'%';
    document.getElementById('tNum').textContent=Math.ceil(left/10);
    if(left<=20)document.getElementById('tNum').style.color='var(--p3)';
    if(left<=0){
      clearInterval(timerInterval);timerExpired=true;
      document.getElementById('timedMsg').innerHTML='<div class="timed-expired">Время вышло. Нерешительность — тоже ответ.</div>';
      sc.water+=2;sc.chaos+=2;
      const btn=document.getElementById('btnNext');btn.style.display='block';enableNext();
    }
  },100);
}
function timedPick(i){
  if(timerExpired)return;
  clearInterval(timerInterval);
  document.querySelectorAll('.timed-opt')[i].classList.add('selected');
  if(i===0){sc.water+=3;sc.root+=1}else{sc.fire+=2;sc.light+=1;sc.chaos+=1}
  const btn=document.getElementById('btnNext');btn.style.display='block';enableNext();
}

/* ═══ Q8: DOT SCALE ═══ */
let dotVal=null;
function renderDots(){
  dotVal=null;
  document.getElementById('qContainer').innerHTML=`
    <div class="q-card">
      <div class="q-num">08 / 08</div><div class="q-mech">🔘 Шкала</div>
      <div class="q-text">Прямо сейчас. Насколько ты — это ты?</div>
      <div class="q-sub">1 = «я далеко от себя» · 10 = «я полностью здесь»</div>
      <div class="dot-scale">${Array.from({length:10},(_, i)=>`<div class="dot" onclick="dotPick(this,${i+1})">${i+1}</div>`).join('')}</div>
      <div class="dot-labels"><span>далеко</span><span>здесь</span></div>
      <button class="btn-next" id="btnNext" onclick="submitDots()">Узнать состав ✦</button>
    </div>`;
}
function dotPick(el,v){
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');dotVal=v;enableNext();
}
function submitDots(){
  if(!ready||dotVal===null)return;
  sc.light+=Math.round(dotVal/3);sc.root+=dotVal>=7?2:0;
  sc.chaos+=dotVal<=3?2:0;sc.water+=dotVal>=4&&dotVal<=6?2:0;
  nxt();
}

/* ═══ RESULTS ═══ */
const archetypes={
  fire:{emoji:'🔥',name:'Огонь',tagline:'Ты — интенсивность. Жар, импульс, движение. Там, где ты — горячо. В хорошем смысле. И иногда в плохом.',desc:'Огонь не спрашивает разрешения гореть. Ты действуешь раньше, чем думаешь, чувствуешь громче, чем показываешь, и оставляешь след — тёплый или обжигающий.'},
  water:{emoji:'💧',name:'Вода',tagline:'Ты — глубина. Тихая, мощная, непредсказуемая. Ты обтекаешь препятствия, а не ломаешь. Но если надо — смываешь.',desc:'Вода адаптируется. Ты чувствуешь других лучше, чем себя, и подстраиваешься под форму сосуда. Но у тебя есть собственное течение — и оно сильнее, чем кажется.'},
  light:{emoji:'✨',name:'Свет',tagline:'Ты — ясность. Чистая, спокойная, тёплая. Ты не самый громкий в комнате — но без тебя в ней темно.',desc:'Свет не борется с тьмой. Он просто есть — и тьма отступает. Ты несёшь осмысленность, теплоту и тот тихий оптимизм, который заражает, не навязывая.'},
  root:{emoji:'🌿',name:'Корни',tagline:'Ты — стабильность. Глубокая, тихая, надёжная. Ты не дерево — ты то, что держит дерево, когда ветер.',desc:'Корни не видны. Но без них ничего не стоит. Ты — фундамент, на который опираются другие, часто не замечая. И тебя это устраивает. Почти всегда.'},
  chaos:{emoji:'🌀',name:'Хаос',tagline:'Ты — энтропия. Не разрушение — трансформация. Ты ломаешь, чтобы построить. Тебе скучно там, где стабильно.',desc:'Хаос — не беспорядок. Это энергия перемен. Ты не можешь сидеть на месте, не можешь повторять, не можешь «как все». И это не баг — это фича.'}
};

function showResults(){
  document.getElementById('progressBar').classList.remove('active');
  document.getElementById('qContainer').innerHTML='';
  const total=Object.values(sc).reduce((a,b)=>a+b,1);
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const topKey=sorted[0][0],a=archetypes[topKey];

  const compBarHTML=sorted.map(([k,v])=>`<div class="comp-seg" data-w="${Math.round((v/total)*100)}" style="background:${scaleColors[k]}"></div>`).join('');
  const compLegendHTML=sorted.map(([k,v])=>`<span class="comp-item"><span class="comp-dot" style="background:${scaleColors[k]}"></span>${scaleEmoji[k]} ${scaleNames[k]} ${Math.round((v/total)*100)}%</span>`).join('');

  const barsHTML=sorted.map(([k,v])=>{const pct=Math.round((v/Math.max(sorted[0][1],1))*100);return`<div class="sc-row"><div class="sc-row-top"><span class="sc-name">${scaleEmoji[k]} ${scaleNames[k]}</span><span class="sc-val" style="color:${scaleColors[k]}">${pct}%</span></div><div class="sc-bg"><div class="sc-fill" data-w="${pct}" style="background:${scaleColors[k]}"></div></div></div>`;}).join('');

  const formula=sorted.slice(0,3).map(([k,v])=>`${scaleEmoji[k]}${Math.round((v/total)*100)}%`).join(' + ');

  const section=document.getElementById('resultsSection');
  section.classList.add('active');
  section.innerHTML=`
    <div class="r-hero">
      <span class="r-icon">${a.emoji}</span>
      <div class="r-label">Главный элемент</div>
      <div class="r-name">${a.name}</div>
    </div>
    <p class="r-tagline">${a.tagline}</p>

    <div class="r-card"><h3>✦ Твой состав</h3>
      <div class="comp-bar" id="compBar">${compBarHTML}</div>
      <div class="comp-legend">${compLegendHTML}</div>
      <p style="text-align:center;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;color:var(--text-bright)">${formula}</p>
    </div>

    <div class="r-card"><h3>${a.emoji} ${a.name}</h3><p>${a.desc}</p></div>

    <div class="r-card"><h3>📊 Полный профиль</h3><div class="sc-bars">${barsHTML}</div></div>

    ${sorted[1][1]>2?`<div class="r-card"><h3>🔀 Второй элемент: ${archetypes[sorted[1][0]].emoji} ${archetypes[sorted[1][0]].name}</h3><p>${archetypes[sorted[1][0]].tagline}</p></div>`:''}

    <div class="actions">
      <button class="btn-act btn-primary" onclick="shareShort()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg> Поделиться</button>
      <button class="btn-act btn-secondary" onclick="copyFull()">📋 Скопировать</button>
      <a href="https://lisofoxa-oss.github.io/tests/" class="btn-act btn-secondary">🧪 Ещё тесты</a>
      <button class="btn-act btn-ghost" onclick="location.reload()">↻ Заново</button>
    </div>`;

  setTimeout(()=>{
    document.querySelectorAll('.sc-fill').forEach(b=>b.style.width=b.dataset.w+'%');
    document.querySelectorAll('.comp-seg').forEach(b=>b.style.width=b.dataset.w+'%');
  },400);
  window.scrollTo({top:0,behavior:'smooth'});
}

function shareShort(){
  const total=Object.values(sc).reduce((a,b)=>a+b,1);
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const formula=sorted.slice(0,3).map(([k,v])=>`${scaleEmoji[k]}${Math.round((v/total)*100)}%`).join(' + ');
  const a=archetypes[sorted[0][0]];
  const text=`✦ Из чего я сделан(-а): ${formula}\n\n${a.emoji} Главный элемент — ${a.name}\n${a.tagline}\n\n✦ Узнай свой состав: https://lisofoxa-oss.github.io/tests/`;
  if(navigator.share)navigator.share({title:'Из чего ты сделан(-а)',text}).catch(()=>{});
  else navigator.clipboard.writeText(text).then(()=>showToast('Скопировано!'));
}

function copyFull(){
  const total=Object.values(sc).reduce((a,b)=>a+b,1);
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const formula=sorted.map(([k,v])=>`  ${scaleEmoji[k]} ${scaleNames[k]}: ${Math.round((v/total)*100)}%`).join('\n');
  const a=archetypes[sorted[0][0]];
  const text=`✦ ИЗ ЧЕГО ТЫ СДЕЛАН(-А)\n\n${a.emoji} ${a.name}\n«${a.tagline}»\n\n📊 Состав:\n${formula}\n\n${a.desc}\n\n→ https://lisofoxa-oss.github.io/tests/`;
  navigator.clipboard.writeText(text).then(()=>showToast('📋 Скопировано!'));
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
</script>

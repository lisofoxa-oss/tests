<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Когда сегодня идти гулять? 🌳☀️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #052e16, #14532d);
      color: #f1f5f9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2.9rem;
      margin: 30px 0 8px;
      background: linear-gradient(90deg, #86efac, #fde047);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #a3e635;
      font-size: 1.25rem;
      margin-bottom: 40px;
    }

    .progress-container {
      height: 8px;
      background: rgba(134, 239, 172, 0.2);
      border-radius: 9999px;
      margin-bottom: 40px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #86efac, #fde047);
      width: 0%;
      transition: width 0.4s ease;
    }

    .question-card {
      background: rgba(15, 50, 30, 0.85);
      border-radius: 28px;
      padding: 40px 35px;
      border: 1px solid #4ade80;
      backdrop-filter: blur(12px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
      min-height: 420px;
    }

    .question-number {
      color: #86efac;
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.6rem;
      line-height: 1.35;
      margin-bottom: 35px;
      color: #e0f2fe;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label {
      display: flex;
      align-items: center;
      padding: 20px 24px;
      background: rgba(30, 70, 45, 0.6);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      font-size: 1.15rem;
    }

    label:hover {
      background: rgba(74, 222, 128, 0.3);
      transform: translateX(10px);
    }

    label.selected {
      background: rgba(134, 239, 172, 0.25);
      border-color: #86efac;
      transform: scale(1.03);
    }

    input[type="radio"] {
      margin-right: 18px;
      accent-color: #86efac;
      transform: scale(1.4);
    }

    .navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 45px;
    }

    button {
      padding: 16px 42px;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }

    #prevBtn {
      background: transparent;
      color: #a3e635;
      border: 2px solid #4ade80;
    }

    #nextBtn {
      background: linear-gradient(45deg, #4ade80, #eab308);
      color: #052e16;
      box-shadow: 0 10px 30px rgba(134, 239, 172, 0.5);
    }

    #nextBtn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(134, 239, 172, 0.6);
    }

    #result {
      display: none;
      text-align: center;
      padding: 55px 35px;
      background: rgba(15, 50, 30, 0.95);
      border-radius: 32px;
      border: 3px dashed #86efac;
      margin-top: 40px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
    }

    .emoji-big {
      font-size: 7rem;
      margin: 15px 0 25px;
      filter: drop-shadow(0 0 35px #fde047);
    }

    .result-time {
      font-size: 2.8rem;
      font-weight: 700;
      color: #fde047;
      margin: 20px 0 15px;
    }

    .result-explain {
      font-size: 1.3rem;
      line-height: 1.5;
      color: #e0f2fe;
      max-width: 520px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Когда сегодня идти гулять?</h1>
    <p class="subtitle">Научный тест для твоей зайки 🌿☀️</p>

    <div class="progress-container">
      <div class="progress-bar" id="progress"></div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNum"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="options"></div>

      <div class="navigation">
        <button id="prevBtn" onclick="prevQuestion()">← Назад</button>
        <button id="nextBtn" onclick="nextQuestion()">Далее →</button>
      </div>
    </div>

    <div id="result">
      <div class="emoji-big" id="emoji"></div>
      <div class="result-time" id="resultTime"></div>
      <div class="result-explain" id="resultExplain"></div>
      <button onclick="restartQuiz()" style="margin-top:40px;background:#86efac;color:#052e16;">Пройти заново</button>
    </div>
  </div>

  <script>
    const questions = [
      { num: 1, text: "Во сколько ты сегодня проснулась?", options: [
        {text:"До 7:00", value:9}, {text:"7:00–8:30", value:11},
        {text:"8:30–10:00", value:14}, {text:"После 10:00", value:17}
      ]},
      { num: 2, text: "Сколько часов ты спала?", options: [
        {text:"Меньше 6", value:17}, {text:"6–7", value:15},
        {text:"7–8", value:13}, {text:"Больше 8", value:11}
      ]},
      { num: 3, text: "Как сейчас твой уровень энергии?", options: [
        {text:"Еле живая 😴", value:18}, {text:"Так себе", value:16},
        {text:"Нормально", value:13}, {text:"Полна сил! 🔥", value:10}
      ]},
      { num: 4, text: "Какая прогулка тебе нужна сегодня?", options: [
        {text:"Энергичная, подвигаться", value:12}, {text:"Спокойная, подумать", value:17},
        {text:"Просто подышать свежим воздухом", value:14}, {text:"Сфоткаться красиво", value:16}
      ]},
      { num: 5, text: "Ты больше любишь солнце или тень?", options: [
        {text:"Я — солнечный зайчик ☀️", value:11}, {text:"Равно", value:14},
        {text:"Люблю тень и прохладу", value:17}, {text:"Не важно, лишь бы гулять", value:13}
      ]},
      { num: 6, text: "Сейчас какое время дня примерно?", options: [
        {text:"Утро (до 11)", value:12}, {text:"День (11–16)", value:14},
        {text:"Вечер (16–20)", value:16}, {text:"Ночь (после 20)", value:18}
      ]},
      { num: 7, text: "Хочешь гулять одна или с кем-то?", options: [
        {text:"Только я и природа", value:15}, {text:"С подругой/парнем", value:13},
        {text:"С музыкой в наушниках", value:14}, {text:"Всё равно", value:14}
      ]},
      { num: 8, text: "Насколько ты устала от экранов сегодня?", options: [
        {text:"Очень сильно", value:17}, {text:"Средне", value:14},
        {text:"Почти нет", value:11}, {text:"Я и так на свежем воздухе", value:13}
      ]}
    ];

    let currentQuestion = 0;
    let answers = new Array(questions.length).fill(null);

    function renderQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('questionNum').textContent = `Вопрос ${q.num} из ${questions.length}`;
      document.getElementById('questionText').textContent = q.text;

      const container = document.getElementById('options');
      container.innerHTML = '';

      q.options.forEach(opt => {
        const label = document.createElement('label');
        label.innerHTML = `
          <input type="radio" name="q${currentQuestion}" value="${opt.value}" ${answers[currentQuestion] === opt.value ? 'checked' : ''}>
          ${opt.text}
        `;
        if (answers[currentQuestion] === opt.value) label.classList.add('selected');

        label.addEventListener('click', () => {
          answers[currentQuestion] = parseInt(opt.value);
          document.querySelectorAll('#options label').forEach(l => l.classList.remove('selected'));
          label.classList.add('selected');
        });
        container.appendChild(label);
      });

      document.getElementById('prevBtn').style.display = currentQuestion === 0 ? 'none' : 'block';
      document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? 'Узнать время! →' : 'Далее →';

      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progress').style.width = `${progress}%`;
    }

    function nextQuestion() {
      if (answers[currentQuestion] === null) {
        alert("Выбери вариант, зайка ❤️");
        return;
      }
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        calculateWalkTime();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    function calculateWalkTime() {
      let total = answers.reduce((a, b) => a + b, 0);
      let avg = total / answers.length; // среднее рекомендованное время

      let timeSlot, emoji, explain;

      if (avg <= 11.5) {
        timeSlot = "9:30 – 11:00";
        emoji = "🌅☀️";
        explain = "Утро — пик кортизола и витамина D. Идеально для энергии на весь день!";
      } else if (avg <= 13.5) {
        timeSlot = "12:00 – 14:30";
        emoji = "🌞🌳";
        explain = "Дневной пик температуры тела. Самое продуктивное время для прогулки по науке.";
      } else if (avg <= 16) {
        timeSlot = "15:40 – 17:20";
        emoji = "🌇✨";
        explain = "Золотой час! Максимум серотонина, красивый свет и настроение на высоте.";
      } else {
        timeSlot = "18:00 – 19:50";
        emoji = "🌆🌙";
        explain = "Вечерний релакс. Помогает выработать мелатонин и отлично выспаться ночью.";
      }

      document.getElementById('questionCard').style.display = 'none';
      const res = document.getElementById('result');
      res.style.display = 'block';

      document.getElementById('emoji').innerHTML = emoji;
      document.getElementById('resultTime').textContent = timeSlot;
      document.getElementById('resultExplain').innerHTML = explain + '<br><br><small style="opacity:0.8">На основе твоих ответов и циркадных ритмов ❤️</small>';
    }

    function restartQuiz() {
      currentQuestion = 0;
      answers = new Array(questions.length).fill(null);
      document.getElementById('questionCard').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      renderQuestion();
    }

    window.onload = renderQuestion;
  </script>
</body>
</html>
